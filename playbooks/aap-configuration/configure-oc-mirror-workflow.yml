---
# Configure AAP Workflow for Disconnected OpenShift Image Mirroring
#
# This playbook creates an end-to-end workflow for mirroring OpenShift images
# and operators to a disconnected registry with operator validation (ADR-0034).
#
# Created: 2026-06-11
# ADRs:
#   - ADR-0032: AAP Workflow Orchestration
#   - ADR-0033: Workflow Validation Framework
#   - ADR-0034: Operator Catalog Validation
#
# Usage:
#   ansible-playbook -i inventory/ibm-cloud.yml \
#     playbooks/aap-configuration/configure-oc-mirror-workflow.yml \
#     -e@extra_vars/rhel-subscription-secrets.yml \
#     --vault-password-file ~/.vault_pass

- name: Configure AAP Disconnected OCP Mirroring Workflow
  hosts: localhost
  gather_facts: false

  vars:
    aap_host: "https://aap.sandbox3377.opentlc.com"
    aap_username: "admin"
    aap_validate_certs: false

    # Project and inventory references
    organization_name: "Default"
    project_name: "ocp4-disconnected-helper"
    inventory_name: "Disconnected Infrastructure"
    credential_name: "KVM Hypervisor SSH Key"
    vault_credential_name: "Ansible Vault Password"
    execution_environment: "OCP4 Custom EE with oc-mirror"

  tasks:
    # =========================================================================
    # Job Template: Step 0 - Verify Infrastructure Prerequisites (NEW - v1.3)
    # =========================================================================
    - name: Create job template - Step 0 Verify Infrastructure Prerequisites
      ansible.controller.job_template:
        controller_host: "{{ aap_host }}"
        controller_username: "{{ aap_username }}"
        controller_password: "{{ admin_password }}"
        validate_certs: "{{ aap_validate_certs }}"
        name: "Step 0: Verify Infrastructure Prerequisites"
        organization: "{{ organization_name }}"
        description: |
          Prerequisite validation for Workflow 2 (Image Mirroring).

          Validates that Workflow 1 (Infrastructure Deployment) completed successfully:
          - Registry accessible and authenticated
          - HAProxy configured and routing traffic
          - SSL/TLS certificates valid
          - Network connectivity verified

          If validation fails:
          - Workflow stops immediately (fail-fast)
          - Clear error message directs user to run Workflow 1 first
          - No bandwidth wasted on downloads

          This ensures users follow correct workflow execution order:
          1. Workflow 1: Infrastructure Deployment
          2. Workflow 2: Image Mirroring (this workflow)
          3. Workflow 3: Cluster Deployment (future)
        job_type: "run"
        inventory: "{{ inventory_name }}"
        project: "{{ project_name }}"
        playbook: "playbooks/verify-infrastructure-prerequisites.yml"
        credentials:
          - "{{ credential_name }}"
        # No limit - playbook runs on localhost with checks against infrastructure
        execution_environment: "{{ execution_environment }}"
        verbosity: 1
        ask_variables_on_launch: true
        extra_vars:
          required_services:
            - registry
            - haproxy
          validation_mode: strict
        state: present
      register: verify_prereqs_template

    - name: Display verify prerequisites template info
      ansible.builtin.debug:
        msg:
          - "✅ Infrastructure prerequisite validation template created (v1.3)"
          - "   ID: {{ verify_prereqs_template.id }}"
          - "   Name: Step 0: Verify Infrastructure Prerequisites"
          - "   Purpose: Enforce Workflow 1 → Workflow 2 execution order"

    # =========================================================================
    # Job Template: Step 1 - Validate Operator Selection (NEW - ADR-0034)
    # =========================================================================
    - name: Create job template - Step 1 Validate Operator Selection
      ansible.controller.job_template:
        controller_host: "{{ aap_host }}"
        controller_username: "{{ aap_username }}"
        controller_password: "{{ admin_password }}"
        validate_certs: "{{ aap_validate_certs }}"
        name: "Step 1: Validate Operator Selection"
        organization: "{{ organization_name }}"
        description: |
          Pre-flight validation of operator selections against Red Hat catalogs.

          Validates:
          - Operator names exist in catalog
          - Channels are valid for operators
          - Catches typos with fuzzy-match suggestions

          Benefits (ADR-0034):
          - Fails fast (<5 sec vs 10+ min with oc-mirror)
          - Saves bandwidth (no partial downloads)
          - Clear error messages with actionable suggestions

          Cache: ~/.cache/oc-mirror/catalogs/ (24h TTL)
        job_type: "run"
        inventory: "{{ inventory_name }}"
        project: "{{ project_name }}"
        playbook: "playbooks/validate-operator-selection.yml"
        credentials:
          - "{{ credential_name }}"
        # No limit - playbook runs on localhost
        execution_environment: "{{ execution_environment }}"
        verbosity: 1
        ask_variables_on_launch: true
        extra_vars:
          operator_validation_strict: true
          operator_validation_suggest_typos: true
          operator_validation_check_channels: true
        state: present
      register: validate_operators_template

    - name: Display validate operators template info
      ansible.builtin.debug:
        msg:
          - "✅ Operator validation template created (ADR-0034)"
          - "   ID: {{ validate_operators_template.id }}"
          - "   Name: Step 1: Validate Operator Selection"
          - "   Purpose: Pre-flight check before mirroring"

    # =========================================================================
    # Job Template: Step 2 - Download to Disk
    # =========================================================================
    - name: Create job template - Step 2 Download OpenShift Images to Disk
      ansible.controller.job_template:
        controller_host: "{{ aap_host }}"
        controller_username: "{{ aap_username }}"
        controller_password: "{{ admin_password }}"
        validate_certs: "{{ aap_validate_certs }}"
        name: "Step 2: Download OpenShift Images to Disk"
        organization: "{{ organization_name }}"
        description: |
          Download OpenShift releases and operators to local workspace.

          Phase 1 of oc-mirror v2 workflow (mirrorToDisk).

          Tasks:
          - Generate ImageSetConfiguration v2alpha1
          - Download images to /data/ocp-mirror/oc-mirror-workspace/
          - Verify workspace integrity

          Variables (ask on launch):
          - openshift_releases: List of OCP versions
          - operators: List of operator catalogs with packages
          - target_mirror_path: Workspace location (default: /data/ocp-mirror)
        job_type: "run"
        inventory: "{{ inventory_name }}"
        project: "{{ project_name }}"
        playbook: "playbooks/download-to-disk-v2.yml"
        credentials:
          - "{{ credential_name }}"
          - "{{ vault_credential_name }}"
        limit: "kvm-host"
        execution_environment: "{{ execution_environment }}"
        verbosity: 1
        become_enabled: yes
        ask_variables_on_launch: true
        extra_vars:
          target_mirror_path: "/data/ocp-mirror"
          clean_mirror_path: false
          parallel_images: 4
          parallel_layers: 5
          max_retries: 5
        state: present
      register: download_template

    - name: Display download template info
      ansible.builtin.debug:
        msg:
          - "✅ Download template created"
          - "   ID: {{ download_template.id }}"
          - "   Name: Step 2: Download OpenShift Images to Disk"

    # =========================================================================
    # Job Template: Step 3 - Push to Registry
    # =========================================================================
    - name: Create job template - Step 3 Mirror Images to Registry
      ansible.controller.job_template:
        controller_host: "{{ aap_host }}"
        controller_username: "{{ aap_username }}"
        controller_password: "{{ admin_password }}"
        validate_certs: "{{ aap_validate_certs }}"
        name: "Step 3: Mirror Images to Registry"
        organization: "{{ organization_name }}"
        description: |
          Push mirrored images from workspace to container registry.

          Phase 2 of oc-mirror v2 workflow (diskToMirror).

          Tasks:
          - Verify workspace exists
          - Authenticate to target registry
          - Push images to registry
          - Generate IDMS/ITMS manifests

          Variables (ask on launch):
          - target_registry: Registry URL (e.g., registry.example.com:8443)
          - target_namespace: Namespace (default: openshift4)
          - skip_tls_verify: Skip cert validation (default: false)
        job_type: "run"
        inventory: "{{ inventory_name }}"
        project: "{{ project_name }}"
        playbook: "playbooks/push-to-registry-v2.yml"
        credentials:
          - "{{ credential_name }}"
          - "{{ vault_credential_name }}"
        limit: "kvm-host"
        execution_environment: "{{ execution_environment }}"
        verbosity: 1
        become_enabled: yes
        ask_variables_on_launch: true
        extra_vars:
          target_namespace: "openshift4"
          skip_tls_verify: false
          parallel_images: 4
          parallel_layers: 5
          max_retries: 5
        state: present
      register: push_template

    - name: Display push template info
      ansible.builtin.debug:
        msg:
          - "✅ Push template created"
          - "   ID: {{ push_template.id }}"
          - "   Name: Step 3: Mirror Images to Registry"

    # =========================================================================
    # Workflow Template: Workflow 2 - OpenShift Image Mirroring
    # =========================================================================
    - name: Create workflow template - Workflow 2 OpenShift Image Mirroring
      ansible.controller.workflow_job_template:
        controller_host: "{{ aap_host }}"
        controller_username: "{{ aap_username }}"
        controller_password: "{{ admin_password }}"
        validate_certs: "{{ aap_validate_certs }}"
        name: "Workflow 2: OpenShift Image Mirroring"
        organization: "{{ organization_name }}"
        description: |
          Mirror OpenShift releases and operators to disconnected registry.

          ⚠️  PREREQUISITE: Workflow 1 (Infrastructure Deployment) must complete successfully first.

          Workflow Steps:
          Step 0: Verify Infrastructure Prerequisites (NEW - v1.3)
             - Validates Workflow 1 completed (registry accessible, HAProxy configured, certificates valid)
             - Fails gracefully if infrastructure not ready
             - Directs user to run Workflow 1 first

          Step 1: Validate Operator Selection (ADR-0034)
             - Pre-flight validation of operator names/channels
             - Fails fast if invalid configuration (<5 sec)
             - Saves bandwidth by catching errors early

          Step 2: Download OpenShift Images
             - oc-mirror mirrorToDisk workflow
             - Downloads to /data/ocp-mirror/oc-mirror-workspace/

          Step 3: Mirror Images to Registry
             - oc-mirror diskToMirror workflow
             - Pushes to target registry
             - Generates IDMS/ITMS manifests

          Benefits:
          - Prerequisite validation prevents confusing failures
          - Operator validation prevents wasted time/bandwidth
          - Two-phase workflow enables air-gapped transfers
          - Automatic manifest generation for cluster config

          Variables (provide via survey or extra_vars):
          - operator_preset: Curated preset (storage-operators, full-platform, etc.)
          - target_registry: registry.example.com:8443
          - target_namespace: openshift4
        inventory: "{{ inventory_name }}"
        ask_variables_on_launch: true
        survey_enabled: true
        survey_spec:
          name: "Operator Preset Selection"
          description: "Select an operator preset or provide custom extra_vars"
          spec:
            - type: multiplechoice
              question_name: "Operator Preset"
              question_description: |
                Choose a curated operator preset or "Custom" to provide your own extra_vars.

                Atomic Presets (Single Focus):
                - Storage (~15 GB)
                - RHACM Multi-Cluster (~20 GB)
                - OpenShift AI/ML (~35 GB)
                - Virtualization (~25 GB)
                - Service Mesh (~18 GB)
                - Observability (~22 GB)
                - Security/Compliance (~20 GB)
                - Advanced Networking (~16 GB)

                Combination Presets (Multi-Capability):
                - Full Platform (~70 GB) - Storage + Observability + Security + Networking
                - Enterprise Ready (~65 GB) - RHACM + Storage + Security + Observability
                - Developer Stack (~60 GB) - Service Mesh + AI + Observability + GitOps
                - VM Platform (~55 GB) - Virtualization + Storage + Networking + Security

                Custom: Provide your own @extra_vars/operators/my-custom.yml
              variable: operator_preset
              required: true
              default: "storage-operators"
              choices:
                # Atomic Presets
                - storage-operators
                - rhacm-operators
                - openshift-ai-operators
                - virtualization-operators
                - service-mesh-operators
                - observability-operators
                - security-operators
                - networking-operators
                # Combination Presets (NEW in v1.3)
                - full-platform
                - enterprise-ready
                - developer-stack
                - vm-platform
                # Custom option
                - custom
            - type: text
              question_name: "Custom Preset Path (if Custom selected)"
              question_description: "If you selected 'custom' above, provide the full path to your extra_vars file (e.g., @extra_vars/operators/my-custom.yml)"
              variable: custom_preset_path
              required: false
              default: ""
            - type: text
              question_name: "Target Registry"
              question_description: "Container registry URL (e.g., registry.example.com:8443)"
              variable: target_registry
              required: true
              default: "registry.ocp4.sandbox3377.opentlc.com:8443"
            - type: text
              question_name: "Target Namespace"
              question_description: "Registry namespace for mirrored images"
              variable: target_namespace
              required: true
              default: "openshift4"
        state: present
      register: workflow_template

    - name: Display workflow template info
      ansible.builtin.debug:
        msg:
          - "✅ Workflow template created"
          - "   ID: {{ workflow_template.id }}"
          - "   Name: Disconnected OpenShift Image Mirroring"

    # =========================================================================
    # Workflow Nodes: Build the workflow graph
    # =========================================================================
    - name: Create workflow node - Verify Prerequisites (Step 0)
      ansible.controller.workflow_job_template_node:
        controller_host: "{{ aap_host }}"
        controller_username: "{{ aap_username }}"
        controller_password: "{{ admin_password }}"
        validate_certs: "{{ aap_validate_certs }}"
        workflow_job_template: "Workflow 2: OpenShift Image Mirroring"
        identifier: "verify_prerequisites"
        unified_job_template: "Step 0: Verify Infrastructure Prerequisites"
        state: present
      register: node_prereqs

    - name: Create workflow node - Validate Operators (Step 1)
      ansible.controller.workflow_job_template_node:
        controller_host: "{{ aap_host }}"
        controller_username: "{{ aap_username }}"
        controller_password: "{{ admin_password }}"
        validate_certs: "{{ aap_validate_certs }}"
        workflow_job_template: "Workflow 2: OpenShift Image Mirroring"
        identifier: "validate_operators"
        unified_job_template: "Step 1: Validate Operator Selection"
        state: present
      register: node_validate

    - name: Create workflow node - Download Images (Step 2)
      ansible.controller.workflow_job_template_node:
        controller_host: "{{ aap_host }}"
        controller_username: "{{ aap_username }}"
        controller_password: "{{ admin_password }}"
        validate_certs: "{{ aap_validate_certs }}"
        workflow_job_template: "Workflow 2: OpenShift Image Mirroring"
        identifier: "download_images"
        unified_job_template: "Step 2: Download OpenShift Images to Disk"
        state: present
      register: node_download

    - name: Create workflow node - Push to Registry (Step 3)
      ansible.controller.workflow_job_template_node:
        controller_host: "{{ aap_host }}"
        controller_username: "{{ aap_username }}"
        controller_password: "{{ admin_password }}"
        validate_certs: "{{ aap_validate_certs }}"
        workflow_job_template: "Workflow 2: OpenShift Image Mirroring"
        identifier: "push_to_registry"
        unified_job_template: "Step 3: Mirror Images to Registry"
        state: present
      register: node_push

    # =========================================================================
    # Workflow Links: Connect nodes with success/failure paths
    # =========================================================================
    - name: Link verify_prerequisites → validate_operators (on success)
      ansible.controller.workflow_job_template_node:
        controller_host: "{{ aap_host }}"
        controller_username: "{{ aap_username }}"
        controller_password: "{{ admin_password }}"
        validate_certs: "{{ aap_validate_certs }}"
        workflow_job_template: "Workflow 2: OpenShift Image Mirroring"
        identifier: "verify_prerequisites"
        success_nodes:
          - "validate_operators"
        state: present

    - name: Link validate_operators → download_images (on success)
      ansible.controller.workflow_job_template_node:
        controller_host: "{{ aap_host }}"
        controller_username: "{{ aap_username }}"
        controller_password: "{{ admin_password }}"
        validate_certs: "{{ aap_validate_certs }}"
        workflow_job_template: "Workflow 2: OpenShift Image Mirroring"
        identifier: "validate_operators"
        success_nodes:
          - "download_images"
        state: present

    - name: Link download_images → push_to_registry (on success)
      ansible.controller.workflow_job_template_node:
        controller_host: "{{ aap_host }}"
        controller_username: "{{ aap_username }}"
        controller_password: "{{ admin_password }}"
        validate_certs: "{{ aap_validate_certs }}"
        workflow_job_template: "Workflow 2: OpenShift Image Mirroring"
        identifier: "download_images"
        success_nodes:
          - "push_to_registry"
        state: present

    # =========================================================================
    # Summary
    # =========================================================================
    - name: Display workflow summary
      ansible.builtin.debug:
        msg:
          - "============================================"
          - "AAP Workflow Configuration Complete (v1.3)"
          - "============================================"
          - ""
          - "Workflow: Workflow 2: OpenShift Image Mirroring"
          - "  ID: {{ workflow_template.id }}"
          - ""
          - "Workflow Graph (v1.3 - 4-node):"
          - "  Step 0: Verify Infrastructure Prerequisites (NEW - v1.3)"
          - "     • Validates Workflow 1 completed (registry, HAProxy, certificates)"
          - "     • Fails gracefully if infrastructure not ready"
          - "     └─► ON SUCCESS → Step 1"
          - "     └─► ON FAILURE → STOP (directs user to run Workflow 1 first)"
          - ""
          - "  Step 1: Validate Operator Selection (ADR-0034)"
          - "     • Pre-flight validation of operator names/channels"
          - "     └─► ON SUCCESS → Step 2"
          - "     └─► ON FAILURE → STOP (prevents wasted bandwidth)"
          - ""
          - "  Step 2: Download OpenShift Images"
          - "     • oc-mirror mirrorToDisk workflow"
          - "     └─► ON SUCCESS → Step 3"
          - "     └─► ON FAILURE → STOP"
          - ""
          - "  Step 3: Mirror Images to Registry"
          - "     • oc-mirror diskToMirror workflow"
          - "     └─► ON SUCCESS → Complete"
          - "     └─► ON FAILURE → Manual intervention required"
          - ""
          - "Benefits:"
          - "  ✅ Prerequisite validation enforces workflow execution order (v1.3 NEW)"
          - "  ✅ Fast failure on invalid operators (<5 sec)"
          - "  ✅ Bandwidth savings (no partial downloads)"
          - "  ✅ Clear error messages with suggestions"
          - "  ✅ Two-phase workflow for air-gapped transfers"
          - ""
          - "Survey Options (v1.2):"
          - "  📋 12 Operator Presets Available:"
          - "     • 8 Atomic Presets (storage, RHACM, AI, virtualization, etc.)"
          - "     • 4 Combination Presets (full-platform, enterprise-ready, etc.)"
          - "     • Custom preset path option"
          - "  🎯 Dropdown selection in AAP Web UI"
          - "  📝 No manual extra_vars editing required"
          - ""
          - "Prerequisites (v1.3 NEW):"
          - "  ⚠️  Workflow 1 (Infrastructure Deployment) must complete first"
          - "  ⚠️  Registry, HAProxy, and certificates must be operational"
          - ""
          - "Next Steps:"
          - "  1. Ensure Workflow 1 completed successfully"
          - "  2. Launch Workflow 2 from AAP Web UI"
          - "  3. Select operator preset from dropdown"
          - "  4. Provide target registry URL"
          - "  5. Submit and monitor 4-node execution"
          - ""
          - "============================================"
