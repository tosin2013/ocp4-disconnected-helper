---
# AAP Configuration: Workflow 1 - Registry Infrastructure Deployment
#
# This playbook configures "Workflow 1: Registry Infrastructure Deployment"
# workflow in AAP 2.6 for deploying container registry infrastructure.
#
# ⚠️ BOOTSTRAP PREREQUISITES (Must exist BEFORE this workflow can run):
#   - VyOS Router (network routing for AAP communication)
#   - DNS Services (name resolution for aap.sandbox3377.opentlc.com)
#   - AAP 2.6 (automation platform itself - bootstrap paradox)
#
# Workflow Structure (5 steps):
#   Step 1: Deploy Registry VM (KVM guest provisioning)
#   Step 2: Setup Registry (Quay/Harbor/JFrog installation)
#   Step 3: Configure HAProxy (SNI routing and SSL termination)
#   Step 4: Setup Certificates (Let's Encrypt or self-signed CA)
#   Step 5: Verify Infrastructure (health checks and validation)
#
# Survey Integration:
#   - Registry Type: quay / harbor / jfrog
#   - Certificate Mode: letsencrypt / selfsigned
#
# Usage:
#   ansible-playbook -i inventory configure-infrastructure-workflow.yml \
#     -e @extra_vars/aap-credentials.yml --vault-password-file ~/.vault_pass

- name: Configure Workflow 1 - Registry Infrastructure Deployment in AAP
  hosts: localhost
  gather_facts: false
  collections:
    - ansible.controller

  vars:
    # AAP Controller connection
    aap_host: "https://aap.sandbox3377.opentlc.com"
    aap_username: "admin"
    aap_validate_certs: false

    # Project and inventory references
    organization_name: "Default"
    project_name: "ocp4-disconnected-helper"
    inventory_name: "Disconnected Infrastructure"
    credential_name: "KVM Hypervisor SSH Key"
    execution_environment: "OCP4 Custom EE with oc-mirror"

    # Workflow name
    workflow_name: "Workflow 1: Registry Infrastructure Deployment"

  tasks:
    # =========================================================================
    # Job Templates Creation
    # =========================================================================
    - name: Create job template - Step 1 Deploy Registry VM
      ansible.controller.job_template:
        controller_host: "{{ aap_host }}"
        controller_username: "{{ aap_username }}"
        controller_password: "{{ admin_password }}"
        validate_certs: "{{ aap_validate_certs }}"
        organization: "{{ organization_name }}"
        name: "Step 1: Deploy Registry VM"
        description: |
          Deploy container registry VM using KVM/libvirt.

          Provisions VM with:
          - 4 vCPU, 16 GiB RAM
          - 200 GiB disk for container storage
          - Static IP on management VLAN
          - Cloud-init configuration

          Prerequisites: VyOS router and DNS services must be operational
        job_type: "run"
        inventory: "{{ inventory_name }}"
        project: "{{ project_name }}"
        playbook: "playbooks/deploy-registry.yml"
        credentials:
          - "{{ credential_name }}"
        execution_environment: "{{ execution_environment }}"
        state: present

    - name: Create job template - Step 2 Setup Registry
      ansible.controller.job_template:
        controller_host: "{{ aap_host }}"
        controller_username: "{{ aap_username }}"
        controller_password: "{{ admin_password }}"
        validate_certs: "{{ aap_validate_certs }}"
        organization: "{{ organization_name }}"
        name: "Step 2: Setup Registry (Quay/Harbor/JFrog)"
        description: |
          Install and configure container registry (survey-driven selection).

          Supported registry types:
          - Quay (mirror-registry v2)
          - Harbor (containerized)
          - JFrog Artifactory (containerized)

          Registry type selected via workflow survey.
        job_type: "run"
        inventory: "{{ inventory_name }}"
        project: "{{ project_name }}"
        playbook: "playbooks/install-mirror-registry.yml"
        credentials:
          - "{{ credential_name }}"
          - "Red Hat Registry Credentials"
        execution_environment: "{{ execution_environment }}"
        ask_variables_on_launch: true
        extra_vars:
          registry_type: "{{ registry_type | default('quay') }}"
        state: present

    - name: Create job template - Step 3 Configure HAProxy
      ansible.controller.job_template:
        controller_host: "{{ aap_host }}"
        controller_username: "{{ aap_username }}"
        controller_password: "{{ admin_password }}"
        validate_certs: "{{ aap_validate_certs }}"
        organization: "{{ organization_name }}"
        name: "Step 3: Configure HAProxy Load Balancer"
        description: |
          Configure HAProxy for SNI-based routing and SSL termination.

          Configuration includes:
          - Frontend SSL termination
          - SNI routing to registry backend
          - Health checks and monitoring
          - SSL certificate integration
        job_type: "run"
        inventory: "{{ inventory_name }}"
        project: "{{ project_name }}"
        playbook: "playbooks/configure-haproxy.yml"
        credentials:
          - "{{ credential_name }}"
        execution_environment: "{{ execution_environment }}"
        state: present

    - name: Create job template - Step 4 Setup Certificates
      ansible.controller.job_template:
        controller_host: "{{ aap_host }}"
        controller_username: "{{ aap_username }}"
        controller_password: "{{ admin_password }}"
        validate_certs: "{{ aap_validate_certs }}"
        organization: "{{ organization_name }}"
        name: "Step 4: Setup SSL/TLS Certificates"
        description: |
          Generate or provision SSL/TLS certificates (survey-driven mode).

          Certificate modes:
          - Let's Encrypt (cloud deployments with Route53 DNS-01 validation)
          - Self-signed CA (disconnected/air-gapped deployments)

          Certificate mode selected via workflow survey.
        job_type: "run"
        inventory: "{{ inventory_name }}"
        project: "{{ project_name }}"
        playbook: "playbooks/setup-certificates.yml"
        credentials:
          - "{{ credential_name }}"
          - "AWS Credentials"
        execution_environment: "{{ execution_environment }}"
        ask_variables_on_launch: true
        extra_vars:
          certificate_mode: "{{ certificate_mode | default('selfsigned') }}"
        state: present

    - name: Create job template - Step 5 Verify Infrastructure Deployment
      ansible.controller.job_template:
        controller_host: "{{ aap_host }}"
        controller_username: "{{ aap_username }}"
        controller_password: "{{ admin_password }}"
        validate_certs: "{{ aap_validate_certs }}"
        organization: "{{ organization_name }}"
        name: "Step 5: Verify Infrastructure Deployment"
        description: |
          Comprehensive infrastructure validation.

          Validates:
          - Registry accessible and authenticated
          - HAProxy routing correctly
          - SSL/TLS certificates valid
          - All services operational

          Fails workflow if any critical component not functional.
        job_type: "run"
        inventory: "{{ inventory_name }}"
        project: "{{ project_name }}"
        playbook: "playbooks/verify-infrastructure-deployment.yml"
        credentials:
          - "{{ credential_name }}"
        execution_environment: "{{ execution_environment }}"
        state: present

    # =========================================================================
    # Workflow Template Creation
    # =========================================================================
    - name: Create workflow template - Registry Infrastructure Deployment
      ansible.controller.workflow_job_template:
        name: "{{ workflow_name }}"
        description: |
          **Workflow 1: Registry Infrastructure Deployment**

          Deploy container registry infrastructure for OpenShift disconnected deployments.

          ⚠️ **Bootstrap Prerequisites** (must exist before running):
          - **VyOS Router**: Network routing for AAP communication
          - **DNS Services**: Name resolution (aap.sandbox3377.opentlc.com)
          - **AAP 2.6**: Automation platform itself (bootstrap paradox)

          Deploy these manually BEFORE running this workflow:
          ```bash
          ansible-playbook playbooks/deploy-vyos.yml
          ansible-playbook playbooks/setup-route53-dns.yml
          ansible-playbook playbooks/deploy-aap-multi-node.yml
          ```

          **Workflow Components** (5 steps):
          - Step 1: Deploy Registry VM (KVM guest provisioning)
          - Step 2: Setup Registry (Quay/Harbor/JFrog)
          - Step 3: Configure HAProxy (SNI routing and SSL termination)
          - Step 4: Setup SSL/TLS Certificates (Let's Encrypt or self-signed)
          - Step 5: Verify Infrastructure (health checks and validation)

          **Workflow Execution Graph**:
          ```
          Step 1: Deploy Registry VM
                    ↓
          Step 2: Setup Registry (Quay/Harbor/JFrog)
                    ↓
          Step 3: Configure HAProxy
                    ↓
          Step 4: Setup Certificates (Let's Encrypt/self-signed)
                    ↓
          Step 5: Verify Infrastructure
          ```

          **Survey Parameters**:
          - Registry Type: quay / harbor / jfrog
          - Certificate Mode: letsencrypt / selfsigned

          **Next Workflow**: Workflow 2 (Image Mirroring) validates that this workflow completed successfully
        organization: "Default"
        inventory: "{{ inventory_name }}"
        survey_enabled: true
        controller_host: "{{ aap_host }}"
        controller_username: "{{ aap_username }}"
        controller_password: "{{ admin_password }}"
        validate_certs: "{{ aap_validate_certs }}"

    # =========================================================================
    # Workflow Survey Configuration
    # =========================================================================
    - name: Create workflow survey
      ansible.controller.workflow_job_template:
        name: "{{ workflow_name }}"
        survey_enabled: true
        survey_spec:
          name: "Registry Infrastructure Configuration"
          description: "Configure registry type and certificate mode"
          spec:
            - question_name: "Registry Type"
              question_description: "Select container registry to deploy"
              required: true
              type: "multiplechoice"
              variable: "registry_type"
              choices:
                - "quay"
                - "harbor"
                - "jfrog"
              default: "quay"

            - question_name: "Certificate Mode"
              question_description: "Select certificate generation mode"
              required: true
              type: "multiplechoice"
              variable: "certificate_mode"
              choices:
                - "letsencrypt"
                - "selfsigned"
              default: "selfsigned"
        controller_host: "{{ aap_host }}"
        controller_username: "{{ aap_username }}"
        controller_password: "{{ admin_password }}"
        validate_certs: "{{ aap_validate_certs }}"

    # =========================================================================
    # Workflow Nodes Creation
    # =========================================================================
    - name: Create workflow node - Step 1 Deploy Registry VM
      ansible.controller.workflow_job_template_node:
        workflow_job_template: "{{ workflow_name }}"
        identifier: "deploy_registry_vm"
        unified_job_template: "Step 1: Deploy Registry VM"
        controller_host: "{{ aap_host }}"
        controller_username: "{{ aap_username }}"
        controller_password: "{{ admin_password }}"
        validate_certs: "{{ aap_validate_certs }}"

    - name: Create workflow node - Step 2 Setup Registry
      ansible.controller.workflow_job_template_node:
        workflow_job_template: "{{ workflow_name }}"
        identifier: "setup_registry"
        unified_job_template: "Step 2: Setup Registry (Quay/Harbor/JFrog)"
        controller_host: "{{ aap_host }}"
        controller_username: "{{ aap_username }}"
        controller_password: "{{ admin_password }}"
        validate_certs: "{{ aap_validate_certs }}"

    - name: Create workflow node - Step 3 Configure HAProxy
      ansible.controller.workflow_job_template_node:
        workflow_job_template: "{{ workflow_name }}"
        identifier: "configure_haproxy"
        unified_job_template: "Step 3: Configure HAProxy Load Balancer"
        controller_host: "{{ aap_host }}"
        controller_username: "{{ aap_username }}"
        controller_password: "{{ admin_password }}"
        validate_certs: "{{ aap_validate_certs }}"

    - name: Create workflow node - Step 4 Setup Certificates
      ansible.controller.workflow_job_template_node:
        workflow_job_template: "{{ workflow_name }}"
        identifier: "setup_certificates"
        unified_job_template: "Step 4: Setup SSL/TLS Certificates"
        controller_host: "{{ aap_host }}"
        controller_username: "{{ aap_username }}"
        controller_password: "{{ admin_password }}"
        validate_certs: "{{ aap_validate_certs }}"

    - name: Create workflow node - Step 5 Verify Infrastructure
      ansible.controller.workflow_job_template_node:
        workflow_job_template: "{{ workflow_name }}"
        identifier: "verify_infrastructure"
        unified_job_template: "Step 5: Verify Infrastructure Deployment"
        controller_host: "{{ aap_host }}"
        controller_username: "{{ aap_username }}"
        controller_password: "{{ admin_password }}"
        validate_certs: "{{ aap_validate_certs }}"

    # =========================================================================
    # Workflow Node Linking (Sequential Execution)
    # =========================================================================
    - name: Link deploy_registry_vm → setup_registry (on success)
      ansible.controller.workflow_job_template_node:
        workflow_job_template: "{{ workflow_name }}"
        identifier: "deploy_registry_vm"
        success_nodes:
          - "setup_registry"
        controller_host: "{{ aap_host }}"
        controller_username: "{{ aap_username }}"
        controller_password: "{{ admin_password }}"
        validate_certs: "{{ aap_validate_certs }}"

    - name: Link setup_registry → configure_haproxy (on success)
      ansible.controller.workflow_job_template_node:
        workflow_job_template: "{{ workflow_name }}"
        identifier: "setup_registry"
        success_nodes:
          - "configure_haproxy"
        controller_host: "{{ aap_host }}"
        controller_username: "{{ aap_username }}"
        controller_password: "{{ admin_password }}"
        validate_certs: "{{ aap_validate_certs }}"

    - name: Link configure_haproxy → setup_certificates (on success)
      ansible.controller.workflow_job_template_node:
        workflow_job_template: "{{ workflow_name }}"
        identifier: "configure_haproxy"
        success_nodes:
          - "setup_certificates"
        controller_host: "{{ aap_host }}"
        controller_username: "{{ aap_username }}"
        controller_password: "{{ admin_password }}"
        validate_certs: "{{ aap_validate_certs }}"

    - name: Link setup_certificates → verify_infrastructure (on success)
      ansible.controller.workflow_job_template_node:
        workflow_job_template: "{{ workflow_name }}"
        identifier: "setup_certificates"
        success_nodes:
          - "verify_infrastructure"
        controller_host: "{{ aap_host }}"
        controller_username: "{{ aap_username }}"
        controller_password: "{{ admin_password }}"
        validate_certs: "{{ aap_validate_certs }}"

    # =========================================================================
    # Summary
    # =========================================================================
    - name: Display workflow configuration summary
      ansible.builtin.debug:
        msg:
          - "=============================================="
          - "Workflow 1: Registry Infrastructure Deployment - Configured"
          - "=============================================="
          - ""
          - "Workflow Name: {{ workflow_name }}"
          - "Survey Enabled: Yes (2 questions)"
          - "Nodes: 5 job templates"
          - ""
          - "⚠️ Bootstrap Prerequisites (must be deployed manually FIRST):"
          - "  - VyOS Router: ansible-playbook playbooks/deploy-vyos.yml"
          - "  - DNS Services: ansible-playbook playbooks/setup-route53-dns.yml"
          - "  - AAP 2.6: ansible-playbook playbooks/deploy-aap-multi-node.yml"
          - ""
          - "Workflow Execution Graph (5 steps):"
          - "  Step 1: Deploy Registry VM"
          - "  Step 2: Setup Registry (Quay/Harbor/JFrog)"
          - "  Step 3: Configure HAProxy"
          - "  Step 4: Setup Certificates (Let's Encrypt/self-signed)"
          - "  Step 5: Verify Infrastructure"
          - ""
          - "Survey Questions:"
          - "  1. Registry Type (quay / harbor / jfrog)"
          - "  2. Certificate Mode (letsencrypt / selfsigned)"
          - ""
          - "Next Steps:"
          - "  1. Deploy this configuration: ansible-playbook configure-infrastructure-workflow.yml"
          - "  2. Access AAP Web UI: {{ aap_host }}"
          - "  3. Navigate to Templates → Workflows"
          - "  4. Launch '{{ workflow_name }}' with survey"
          - ""
          - "=============================================="
