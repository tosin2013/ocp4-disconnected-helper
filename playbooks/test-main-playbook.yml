---
# Test Main Playbook - deploy-openshift-cluster.yml
# Tests playbook structure and variable loading (simulation mode)

- name: Test OpenShift Cluster Deployment Playbook
  hosts: localhost
  gather_facts: true

  vars_files:
    - ../extra_vars/cluster-configs/sno-quay.yml

  vars:
    # Override for test (don't modify real install dir)
    openshift_install_dir: "/tmp/test-deploy-{{ cluster_name }}"
    iso_output_path: "/tmp/test-iso"
    credentials_export_dir: "/tmp/test-credentials"

  tasks:
    - name: Display test start
      ansible.builtin.debug:
        msg:
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - "Main Playbook Test (Simulation Mode)"
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - ""
          - "⚠️  This test validates playbook structure without execution"
          - ""
          - "Tests performed:"
          - "  ✓ Playbook YAML syntax"
          - "  ✓ Variable loading from cluster configs"
          - "  ✓ Registry variable substitution"
          - "  ✓ Pre-task banner display"
          - "  ✓ Post-task summary display"
          - "  ✓ Tag-based execution support"

    - name: Load registry variables
      ansible.builtin.include_vars:
        file: "../roles/openshift_cluster_deploy/vars/{{ registry_type }}.yml"

    - name: Verify cluster configuration loaded
      ansible.builtin.assert:
        that:
          - cluster_name is defined
          - base_domain is defined
          - cluster_topology is defined
          - registry_type is defined
          - ocp_version is defined
        fail_msg: "Required cluster configuration variables missing"
        success_msg: "✅ All required variables defined"

    - name: Verify registry mirror paths loaded
      ansible.builtin.assert:
        that:
          - registry_mirror_paths is defined
          - registry_mirror_paths | length > 0
        fail_msg: "Registry mirror paths not loaded"
        success_msg: "✅ Registry mirror paths loaded ({{ registry_mirror_paths | length }} entries)"

    - name: Display loaded configuration
      ansible.builtin.debug:
        msg:
          - "Loaded Configuration:"
          - "  Cluster: {{ cluster_name }}.{{ base_domain }}"
          - "  Topology: {{ cluster_topology }}"
          - "  Registry: {{ registry_type }} ({{ registry_url }})"
          - "  OpenShift: {{ ocp_version }}"
          - "  Control Plane: {{ control_plane_replicas }} nodes"
          - "  Workers: {{ compute_replicas }} nodes"
          - "  API VIP: {{ api_vip }}"
          - "  Ingress VIP: {{ ingress_vip }}"

    - name: Verify playbook file exists
      ansible.builtin.stat:
        path: "playbooks/deploy-openshift-cluster.yml"
      register: playbook_file

    - name: Verify playbook syntax
      ansible.builtin.debug:
        msg:
          - "✅ Playbook file exists: {{ playbook_file.stat.exists }}"
          - "   {% if playbook_file.stat.exists %}Size: {{ (playbook_file.stat.size / 1024) | round(2) }} KB{% endif %}"

    - name: Test tag filtering simulation
      ansible.builtin.debug:
        msg:
          - "Tag-Based Execution Examples:"
          - ""
          - "Validate only:"
          - "  --tags phase0"
          - ""
          - "ISO generation only:"
          - "  --tags phase3"
          - ""
          - "DNS configuration only:"
          - "  --tags phase4"
          - ""
          - "VM provisioning only:"
          - "  --tags phase5"
          - ""
          - "Installation monitoring only:"
          - "  --tags phase6"
          - ""
          - "Partial deployment (ISO + DNS + VMs):"
          - "  --tags phase3,phase4,phase5"

    - name: Display AAP integration points
      ansible.builtin.debug:
        msg:
          - "AAP Workflow 3 Integration:"
          - ""
          - "Job Templates (5):"
          - "  1. OpenShift: Validate Prerequisites"
          - "     → playbooks/deploy-openshift-cluster.yml --tags phase0"
          - ""
          - "  2. OpenShift: Generate Bootable ISO"
          - "     → playbooks/deploy-openshift-cluster.yml --tags phase1,phase2,phase3"
          - ""
          - "  3. OpenShift: Configure DNS"
          - "     → playbooks/deploy-openshift-cluster.yml --tags phase4"
          - ""
          - "  4. OpenShift: Provision VMs"
          - "     → playbooks/deploy-openshift-cluster.yml --tags phase5"
          - ""
          - "  5. OpenShift: Monitor Installation"
          - "     → playbooks/deploy-openshift-cluster.yml --tags phase6"
          - ""
          - "Workflow Execution:"
          - "  Node 1 (Validate) → Node 2 (ISO) → Node 3 (DNS) → Node 4 (VMs) → Node 5 (Monitor)"
          - ""
          - "Survey Parameters:"
          - "  - cluster_name: {{ cluster_name }}"
          - "  - base_domain: {{ base_domain }}"
          - "  - cluster_topology: {{ cluster_topology }}"
          - "  - registry_type: {{ registry_type }}"
          - "  - registry_url: {{ registry_url }}"
          - "  - ocp_version: {{ ocp_version }}"
          - "  - dns_provider: {{ dns_provider | default('dnsmasq') }}"
          - "  - api_vip: {{ api_vip }}"
          - "  - ingress_vip: {{ ingress_vip }}"

    - name: Display test summary
      ansible.builtin.debug:
        msg:
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - "Test Results"
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - ""
          - "✅ Main Playbook Structure:"
          - "   • playbooks/deploy-openshift-cluster.yml"
          - "   • Pre-task banner with deployment details"
          - "   • Role: openshift_cluster_deploy"
          - "   • Post-task summary with access instructions"
          - ""
          - "✅ Variable Loading:"
          - "   • Cluster config from extra_vars/cluster-configs/"
          - "   • Registry-specific vars from roles/../vars/"
          - "   • All required variables present"
          - ""
          - "✅ Tag Support:"
          - "   • phase0: Validation"
          - "   • phase1-3: ISO generation"
          - "   • phase4: DNS"
          - "   • phase5: VM provisioning"
          - "   • phase6: Installation monitoring"
          - ""
          - "✅ AAP Workflow 3:"
          - "   • configure-workflow-3-openshift-cluster.yml"
          - "   • 5 job templates (one per phase)"
          - "   • Sequential workflow with 5 nodes"
          - "   • 9 survey parameters"
          - ""
          - "Real Deployment:"
          - "  # Full deployment"
          - "  ansible-playbook playbooks/deploy-openshift-cluster.yml \\"
          - "    -e @extra_vars/cluster-configs/sno-quay.yml"
          - ""
          - "  # Phase-specific"
          - "  ansible-playbook playbooks/deploy-openshift-cluster.yml \\"
          - "    -e @extra_vars/cluster-configs/compact-3node-quay.yml \\"
          - "    --tags phase3,phase5"
          - ""
          - "AAP Workflow Launch:"
          - "  1. Navigate to AAP Web UI"
          - "  2. Templates → Deploy OpenShift Cluster (Agent-Based)"
          - "  3. Click 'Launch'"
          - "  4. Fill survey parameters"
          - "  5. Submit and monitor"
