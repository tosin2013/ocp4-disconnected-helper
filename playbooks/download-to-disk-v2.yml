---
# oc-mirror v2 Download to Disk Playbook
#
# This playbook downloads OpenShift releases and Operator catalogs using oc-mirror v2
# and stores them to a local directory (mirrorToDisk workflow).
#
# Key differences from v1:
# - Uses ImageSetConfiguration v2alpha1 (not v1alpha2)
# - No storageConfig section in imageset config
# - Requires --v2 flag
# - Workspace managed via CLI flags, not config file
#
# Usage:
#   # Dry-run mode (validate config only)
#   ansible-playbook -i inventory download-to-disk-v2.yml -e "dry_run=true"
#
#   # Production run
#   ansible-playbook -i inventory download-to-disk-v2.yml
#
# Variables (see extra_vars/mirror-example.yml):
#   target_mirror_path: Local storage path (e.g., /data/ocp-mirror)
#   openshift_releases: List of OCP versions to mirror
#   operators: List of operators to mirror
#   dry_run: Set to true for validation only (default: false)
#   oc_mirror_version: "v2" or "latest" (default: latest)

- name: Download OpenShift images using oc-mirror v2
  hosts: all  # Will resolve to kvm-host when AAP job template sets limit
  gather_facts: true
  become: true

  pre_tasks:
    - name: Load operator preset if specified (AAP survey integration)
      when: operator_preset is defined and operator_preset != "custom"
      block:
        - name: Build preset file path
          ansible.builtin.set_fact:
            preset_file_path: "{{ playbook_dir }}/../extra_vars/operators/{{ operator_preset }}.yml"

        - name: Load preset extra_vars
          ansible.builtin.include_vars:
            file: "{{ preset_file_path }}"

        - name: Display loaded preset
          ansible.builtin.debug:
            msg:
              - "✅ Loaded operator preset: {{ operator_preset }}"
              - "   OpenShift Releases: {{ openshift_releases | length }}"
              - "   Operator Catalogs: {{ operators | length }}"
              - "   Total Packages: {{ operators | map(attribute='packages') | flatten | length }}"

    - name: Load custom preset if specified
      when:
        - operator_preset is defined
        - operator_preset == "custom"
        - custom_preset_path is defined
      ansible.builtin.include_vars:
        file: "{{ custom_preset_path }}"

  vars:
    # Default values (override in inventory or extra_vars)
    target_mirror_path: "/data/ocp-mirror"
    oc_mirror_version: "latest"  # or specific version like "4.21.0"
    dry_run: false
    clean_mirror_path: false

    # oc-mirror v2 settings
    parallel_images: 4
    parallel_layers: 5
    max_retries: 5

    # Base packages required
    base_packages:
      - podman
      - skopeo
      - jq
      - tar
      - gzip
      - wget
      - curl

  tasks:
    # =========================================================================
    # Prerequisites Installation
    # =========================================================================
    - name: Install base packages
      ansible.builtin.package:
        name: "{{ base_packages }}"
        state: present

    - name: Check for oc binary
      ansible.builtin.command: which oc
      changed_when: false
      failed_when: false
      register: oc_check

    - name: Install oc binary if missing
      when: oc_check.rc != 0
      block:
        - name: Download oc binary
          ansible.builtin.get_url:
            url: "https://mirror.openshift.com/pub/openshift-v4/{{ ansible_architecture }}/clients/ocp/{{ oc_mirror_version if oc_mirror_version != 'latest' else 'stable' }}/openshift-client-linux.tar.gz"
            dest: /tmp/openshift-client-linux.tar.gz
            mode: '0755'

        - name: Extract oc binary
          ansible.builtin.unarchive:
            src: /tmp/openshift-client-linux.tar.gz
            dest: /usr/local/bin
            remote_src: true
            mode: '0755'

    - name: Check for oc-mirror binary
      ansible.builtin.command: which oc-mirror
      changed_when: false
      failed_when: false
      register: oc_mirror_check

    - name: Install oc-mirror binary if missing
      when: oc_mirror_check.rc != 0
      block:
        - name: Download oc-mirror binary
          ansible.builtin.get_url:
            url: "https://mirror.openshift.com/pub/openshift-v4/{{ ansible_architecture }}/clients/ocp/{{ oc_mirror_version if oc_mirror_version != 'latest' else 'stable' }}/oc-mirror.tar.gz"
            dest: /tmp/oc-mirror.tar.gz
            mode: '0755'

        - name: Extract oc-mirror binary
          ansible.builtin.unarchive:
            src: /tmp/oc-mirror.tar.gz
            dest: /usr/local/bin
            remote_src: true
            mode: '0755'

        - name: Make oc-mirror executable
          ansible.builtin.file:
            path: /usr/local/bin/oc-mirror
            mode: '0755'

    - name: Verify oc-mirror version
      ansible.builtin.command: /usr/local/bin/oc-mirror version
      register: oc_mirror_version_output
      changed_when: false
      environment:
        PATH: "{{ ansible_env.PATH }}:/usr/local/bin"

    - name: Display oc-mirror version
      ansible.builtin.debug:
        msg: "{{ oc_mirror_version_output.stdout_lines }}"

    # =========================================================================
    # Pull Secret Validation
    # =========================================================================
    - name: Check for pull-secret.json
      ansible.builtin.stat:
        path: "{{ lookup('env', 'HOME') }}/pull-secret.json"
      register: pull_secret_stat

    - name: Fail if pull-secret.json not found
      ansible.builtin.fail:
        msg: |
          ❌ REQUIRED: pull-secret.json not found

          Download your Red Hat pull secret from:
          https://console.redhat.com/openshift/install/pull-secret

          Save it to: {{ lookup('env', 'HOME') }}/pull-secret.json
      when: not pull_secret_stat.stat.exists

    - name: Validate pull-secret.json format
      ansible.builtin.command:
        cmd: jq empty {{ lookup('env', 'HOME') }}/pull-secret.json
      changed_when: false

    # =========================================================================
    # Workspace Preparation
    # =========================================================================
    - name: Create mirror workspace directory
      ansible.builtin.file:
        path: "{{ target_mirror_path }}"
        state: directory
        mode: '0755'

    - name: Clean workspace if requested
      when: clean_mirror_path
      block:
        - name: Remove existing workspace
          ansible.builtin.file:
            path: "{{ target_mirror_path }}/oc-mirror-workspace"
            state: absent

        - name: Remove existing TAR files
          ansible.builtin.find:
            paths: "{{ target_mirror_path }}"
            patterns: "*.tar"
          register: tar_files

        - name: Delete TAR files
          ansible.builtin.file:
            path: "{{ item.path }}"
            state: absent
          loop: "{{ tar_files.files }}"

    - name: Check available disk space
      ansible.builtin.shell: |
        df -BG {{ target_mirror_path }} | tail -1 | awk '{print $4}' | tr -d 'G'
      register: available_space
      changed_when: false

    - name: Warn if disk space is low
      ansible.builtin.debug:
        msg: "⚠️  WARNING: Only {{ available_space.stdout }}GB available. Recommend 100GB+ per OCP release."
      when: available_space.stdout | int < 100

    # =========================================================================
    # Preflight: Check for Stale Ansible Async Cache
    # =========================================================================
    # Detect stale async cache from previous failed runs that would cause
    # misleading errors (e.g., "port 55000 already bound")

    - name: Check for stale async cache files
      ansible.builtin.find:
        paths: "{{ lookup('env', 'HOME') }}/.ansible_async/"
        age: "1d"
        file_type: file
      register: stale_async_cache
      failed_when: false
      changed_when: false

    - name: Check for stale async cache in root (when using become)
      ansible.builtin.find:
        paths: "/root/.ansible_async/"
        age: "1d"
        file_type: file
      register: stale_async_cache_root
      become: true
      failed_when: false
      changed_when: false
      when: ansible_user_id != "root"

    - name: Warn if stale async cache detected
      ansible.builtin.debug:
        msg:
          - "⚠️  WARNING: Stale Ansible async cache detected"
          - "   Location: {{ '~/.ansible_async/' if stale_async_cache.matched > 0 else '/root/.ansible_async/' }}"
          - "   Files: {{ stale_async_cache.matched + (stale_async_cache_root.matched | default(0)) }} files older than 1 day"
          - ""
          - "   This may cause the playbook to return cached failures instead of executing fresh."
          - "   If the playbook fails immediately (<5 seconds), clear the cache:"
          - ""
          - "   sudo rm -rf /root/.ansible_async/*"
          - "   rm -rf ~/.ansible_async/*"
      when: (stale_async_cache.matched > 0) or (stale_async_cache_root.matched | default(0) > 0)

    # =========================================================================
    # ImageSetConfiguration Generation (v2alpha1)
    # =========================================================================
    - name: Determine operator catalog channels
      ansible.builtin.include_tasks:
        file: tasks/get-operator-catalog-channels.yml
      loop: "{{ operators | default([]) }}"
      loop_control:
        loop_var: operator
      when: operators is defined and operators | length > 0

    - name: Generate ImageSetConfiguration v2alpha1
      ansible.builtin.copy:
        content: |
          ---
          kind: ImageSetConfiguration
          apiVersion: mirror.openshift.io/v2alpha1

          mirror:
            platform:
              graph: {{ enable_graph | default(true) }}
          {% if architectures is defined and architectures | length > 0 %}
              architectures:
          {% for arch in architectures %}
                - {{ arch }}
          {% endfor %}
          {% endif %}
              channels:
          {% if openshift_releases is defined and openshift_releases | length > 0 %}
          {% for release in openshift_releases %}
                - name: {{ release.name }}
                  type: ocp
          {% if release.minVersion is defined %}
                  minVersion: {{ release.minVersion }}
          {% endif %}
          {% if release.maxVersion is defined %}
                  maxVersion: {{ release.maxVersion }}
          {% endif %}
          {% if release.shortestPath is defined %}
                  shortestPath: {{ release.shortestPath }}
          {% endif %}
          {% endfor %}
          {% endif %}

          {% if operators is defined and operators | length > 0 %}
            operators:
          {% for catalog in determined_operator_catalog %}
              - catalog: {{ catalog.catalog }}
                packages:
          {% for package in catalog.packages %}
                  - name: {{ package.name }}
          {% if package.channels is defined %}
                    channels:
          {% for channel in package.channels %}
                      - name: {{ channel.name }}
          {% endfor %}
          {% endif %}
          {% endfor %}
          {% endfor %}
          {% endif %}

          {% if additional_images is defined and additional_images | length > 0 %}
            additionalImages:
          {% for image in additional_images %}
              - name: {{ image }}
          {% endfor %}
          {% endif %}

            helm: {}
        dest: "{{ target_mirror_path }}/imageset-config-v2.yml"
        mode: '0644'

    - name: Display generated ImageSetConfiguration
      ansible.builtin.command:
        cmd: cat {{ target_mirror_path }}/imageset-config-v2.yml
      register: imageset_content
      changed_when: false

    - name: Show ImageSetConfiguration
      ansible.builtin.debug:
        msg: "{{ imageset_content.stdout_lines }}"

    # =========================================================================
    # Dry-Run Mode (Validation Only)
    # =========================================================================
    - name: Dry-run validation
      when: dry_run | bool
      block:
        - name: Run oc-mirror with --dry-run
          ansible.builtin.command:
            cmd: >
              oc-mirror
              --config {{ target_mirror_path }}/imageset-config-v2.yml
              file://{{ target_mirror_path }}/oc-mirror-workspace
              --authfile {{ lookup('env', 'HOME') }}/pull-secret.json
              --dry-run
              --v2
            chdir: "{{ target_mirror_path }}"
          register: dry_run_output
          changed_when: false
          failed_when: false

        - name: Display dry-run results
          ansible.builtin.debug:
            msg: "{{ dry_run_output.stdout_lines }}"

        - name: Display dry-run errors if any
          ansible.builtin.debug:
            msg: "{{ dry_run_output.stderr_lines }}"
          when: dry_run_output.rc != 0

        - name: End play after dry-run
          ansible.builtin.meta: end_play

    # =========================================================================
    # Production Run (mirrorToDisk)
    # =========================================================================
    - name: Build oc-mirror command
      ansible.builtin.set_fact:
        oc_mirror_cmd: >-
          oc-mirror
          --config {{ target_mirror_path }}/imageset-config-v2.yml
          file://{{ target_mirror_path }}/oc-mirror-workspace
          --authfile {{ lookup('env', 'HOME') }}/pull-secret.json
          --parallel-images {{ parallel_images }}
          --parallel-layers {{ parallel_layers }}
          --retry-times {{ max_retries }}
          --v2

    - name: Display oc-mirror command
      ansible.builtin.debug:
        msg: "{{ oc_mirror_cmd }}"

    - name: Run oc-mirror with failure handling
      block:
        - name: Run oc-mirror (mirrorToDisk) - Phase 1
          ansible.builtin.command:
            cmd: "{{ oc_mirror_cmd }}"
            chdir: "{{ target_mirror_path }}"
          environment:
            PATH: "{{ ansible_env.PATH }}:/usr/local/bin"
          async: 14400  # 4 hours timeout
          poll: 30      # Check every 30 seconds
          register: mirror_output

        - name: Display mirror results
          ansible.builtin.debug:
            msg: "{{ mirror_output.stdout_lines }}"

      rescue:
        - name: Get failed async job ID
          ansible.builtin.set_fact:
            failed_job_id: "{{ mirror_output.ansible_job_id | default('unknown') }}"

        - name: Remove failed async cache file (user)
          ansible.builtin.file:
            path: "{{ lookup('env', 'HOME') }}/.ansible_async/{{ failed_job_id }}"
            state: absent
          failed_when: false

        - name: Remove failed async cache file (root)
          ansible.builtin.file:
            path: "/root/.ansible_async/{{ failed_job_id }}"
            state: absent
          become: true
          failed_when: false

        - name: Display failure with cleanup notice
          ansible.builtin.fail:
            msg:
              - "❌ oc-mirror failed"
              - "   Async cache cleaned for job: {{ failed_job_id }}"
              - ""
              - "   To retry: ansible-playbook -i inventory/ibm-cloud.yml playbooks/download-to-disk-v2.yml -e @extra_vars/mirror-v2-test.yml"

    # =========================================================================
    # Post-Mirror Summary
    # =========================================================================
    - name: Check workspace size
      ansible.builtin.shell: |
        du -sh {{ target_mirror_path }}/oc-mirror-workspace
      register: workspace_size
      changed_when: false

    - name: Display completion summary
      ansible.builtin.debug:
        msg:
          - "=============================================="
          - "oc-mirror v2 Download Complete"
          - "=============================================="
          - ""
          - "Workspace: {{ target_mirror_path }}/oc-mirror-workspace"
          - "Size: {{ workspace_size.stdout }}"
          - "Config: {{ target_mirror_path }}/imageset-config-v2.yml"
          - ""
          - "Next Steps:"
          - "1. Transport workspace to disconnected environment"
          - "2. Run push-to-registry-v2.yml to upload to registry"
          - ""
          - "Or create TAR archive:"
          - "  cd {{ target_mirror_path }}"
          - "  tar czf ocp-mirror-$(date +%Y%m%d).tar.gz oc-mirror-workspace/"
          - ""
          - "=============================================="
