---
# Validate AAP 2.6 Multi-Node Password Configuration
# ADR Reference: ADR 0028 - AAP 2.6 Multi-Node Password Architecture
#
# Purpose: Preflight check to prevent password-related authentication failures
#
# Usage:
#   ansible-playbook -i inventory/ibm-cloud.yml playbooks/validate-aap-passwords.yml \
#     -e@extra_vars/rhel-subscription-secrets.yml --vault-password-file ~/.vault_pass

- name: Validate AAP Password Configuration
  hosts: localhost
  gather_facts: no
  vars_files:
    - ../extra_vars/rhel-subscription-secrets.yml

  tasks:
    - name: Check all 5 AAP passwords are defined
      ansible.builtin.assert:
        that:
          - automationgateway_admin_password is defined
          - admin_password is defined
          - automationgateway_pg_password is defined
          - pg_password is defined
          - postgresql_admin_password is defined
        fail_msg: |
          ❌ VALIDATION FAILED: Missing AAP password variables

          Required passwords for AAP 2.6 multi-node deployment:
            - automationgateway_admin_password (Gateway Web UI)
            - admin_password (Controller API)
            - automationgateway_pg_password (Gateway database connection)
            - pg_password (Controller database connection)
            - postgresql_admin_password (PostgreSQL admin)

          See: docs/adrs/0028-aap-multi-node-password-architecture.md
               extra_vars/rhel-subscription-secrets.yml.example
        success_msg: "✅ All 5 AAP password variables defined"

    - name: Verify Gateway and Controller passwords are different (Security Best Practice)
      ansible.builtin.assert:
        that:
          - automationgateway_admin_password != admin_password
        fail_msg: |
          ⚠️ SECURITY WARNING: automationgateway_admin_password and admin_password are identical

          AAP 2.6 multi-node architecture requires separate passwords for:
            - Gateway (Web UI authentication)
            - Controller (API automation credentials)

          Using the same password for both defeats the security isolation between
          user-facing UI and backend automation services.

          Action Required:
            1. Edit extra_vars/rhel-subscription-secrets.yml
            2. Set different values for automationgateway_admin_password and admin_password
            3. Re-run this validation playbook

          See: docs/adrs/0028-aap-multi-node-password-architecture.md
        success_msg: "✅ Gateway and Controller passwords are distinct (security best practice)"

    - name: Verify all passwords meet minimum length requirement
      ansible.builtin.assert:
        that:
          - automationgateway_admin_password | length >= 12
          - admin_password | length >= 12
          - automationgateway_pg_password | length >= 12
          - pg_password | length >= 12
          - postgresql_admin_password | length >= 12
        fail_msg: |
          ⚠️ PASSWORD STRENGTH WARNING: One or more passwords are shorter than 12 characters

          Red Hat recommends minimum 12-character passwords for AAP deployments.

          See: https://docs.redhat.com/en/documentation/red_hat_ansible_automation_platform/2.6/html/red_hat_ansible_automation_platform_planning_guide/security-best-practices
        success_msg: "✅ All passwords meet minimum length requirement (12+ characters)"

    - name: Display password configuration summary
      ansible.builtin.debug:
        msg:
          - "═══════════════════════════════════════════════════════════"
          - "  AAP 2.6 Multi-Node Password Validation: PASSED ✅"
          - "═══════════════════════════════════════════════════════════"
          - ""
          - "Password Configuration:"
          - "  ✅ All 5 required passwords defined"
          - "  ✅ Gateway and Controller passwords are distinct"
          - "  ✅ All passwords meet minimum length (12+ chars)"
          - ""
          - "Authentication Reference:"
          - "  📱 Web UI Login:"
          - "     URL: https://aap.sandbox3377.opentlc.com"
          - "     User: admin"
          - "     Pass: <automationgateway_admin_password>"
          - ""
          - "  🔧 Controller API:"
          - "     Auth: Basic (admin:<admin_password>)"
          - "     Test: curl -u admin:<password> https://aap.../api/controller/v2/ping/"
          - ""
          - "  📚 Documentation: docs/adrs/0028-aap-multi-node-password-architecture.md"
          - "═══════════════════════════════════════════════════════════"
