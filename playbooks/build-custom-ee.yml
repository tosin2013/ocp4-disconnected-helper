---
# Build and Publish Custom AAP Execution Environment
# Implements ADR 0029: Custom Execution Environment for AAP Registry Authentication
#
# Usage:
#   ansible-playbook -i inventory/ibm-cloud.yml playbooks/build-custom-ee.yml \
#     -e@extra_vars/rhel-subscription-secrets.yml --vault-password-file ~/.vault_pass
#
# Prerequisites:
#   - ansible-builder installed (pip install ansible-builder)
#   - Podman installed and running
#   - Quay.io registry credentials in extra_vars/rhel-subscription-secrets.yml
#   - ocp4-aap-execution-environment repository cloned locally

- name: Build and Publish Custom AAP Execution Environment
  hosts: localhost
  gather_facts: yes

  vars:
    ee_repo_path: "/home/vpcuser/ocp4-aap-execution-environment"
    ee_image_name: "quay.io/takinosh/ocp4-aap-execution-environment"
    ee_image_tag: "latest"
    ee_full_image: "{{ ee_image_name }}:{{ ee_image_tag }}"

  tasks:
    # =========================================================================
    # Phase 1: Preflight Checks
    # =========================================================================
    - name: Verify ansible-builder is installed
      ansible.builtin.command:
        cmd: ansible-builder --version
      register: ansible_builder_check
      failed_when: false
      changed_when: false

    - name: Install ansible-builder if missing
      ansible.builtin.pip:
        name: ansible-builder
        state: present
        executable: pip3
      when: ansible_builder_check.rc != 0

    - name: Verify Podman is available
      ansible.builtin.command:
        cmd: podman --version
      register: podman_check
      changed_when: false

    - name: Verify EE repository exists
      ansible.builtin.stat:
        path: "{{ ee_repo_path }}/execution-environment.yml"
      register: ee_repo_stat
      failed_when: not ee_repo_stat.stat.exists

    - name: Display preflight summary
      ansible.builtin.debug:
        msg:
          - "✅ Preflight Checks Complete"
          - "  - ansible-builder: {{ ansible_builder_check.stdout | default('Installed') }}"
          - "  - Podman: {{ podman_check.stdout }}"
          - "  - EE Repository: {{ ee_repo_path }}"
          - "  - Target Image: {{ ee_full_image }}"

    # =========================================================================
    # Phase 2: Verify execution-environment.yml has registry auth steps
    # =========================================================================
    - name: Verify execution-environment.yml exists
      ansible.builtin.stat:
        path: "{{ ee_repo_path }}/execution-environment.yml"
      register: ee_config_stat

    - name: Display EE configuration note
      ansible.builtin.debug:
        msg:
          - "✅ execution-environment.yml verified"
          - "   Registry auth steps already included (ADR 0029)"
          - "   Build args will be passed via --build-arg flags"

    # =========================================================================
    # Phase 3: Authenticate to registry.redhat.io (required for base image pull)
    # =========================================================================
    - name: Authenticate to registry.redhat.io for base image pull
      ansible.builtin.shell:
        cmd: echo "{{ registry_password }}" | podman login registry.redhat.io --username "{{ registry_username | trim }}" --password-stdin
      become: false  # Run as vpcuser for rootless podman
      no_log: true
      register: rh_registry_login

    - name: Verify registry.redhat.io authentication
      ansible.builtin.debug:
        msg: "✅ Authenticated to registry.redhat.io as {{ registry_username }}"

    # =========================================================================
    # Phase 4: Build Execution Environment
    # =========================================================================
    - name: Build execution environment with ansible-builder
      ansible.builtin.command:
        cmd: >
          /home/vpcuser/.local/bin/ansible-builder build
          --tag {{ ee_full_image }}
          --container-runtime podman
          --build-arg REGISTRY_USERNAME={{ registry_username }}
          --build-arg REGISTRY_PASSWORD={{ registry_password }}
          -v 3
        chdir: "{{ ee_repo_path }}"
      become: false  # Run as vpcuser for rootless podman
      register: ee_build
      async: 1800  # 30 minute timeout
      poll: 10

    - name: Display build output
      ansible.builtin.debug:
        msg: "{{ ee_build.stdout_lines }}"

    - name: Verify image was created
      ansible.builtin.command:
        cmd: podman images {{ ee_full_image }} --format "{{{{ .Repository }}}}:{{{{ .Tag }}}}"
      become: false  # Run as vpcuser for rootless podman
      register: image_verify
      changed_when: false

    - name: Display image details
      ansible.builtin.command:
        cmd: podman inspect {{ ee_full_image }} --format json
      become: false  # Run as vpcuser for rootless podman
      register: image_inspect
      changed_when: false

    - name: Parse image metadata
      ansible.builtin.set_fact:
        image_metadata: "{{ image_inspect.stdout | from_json | first }}"

    - name: Display build summary
      ansible.builtin.debug:
        msg:
          - "✅ Execution Environment Built Successfully"
          - "  - Image: {{ ee_full_image }}"
          - "  - Size: {{ (image_metadata.Size / 1024 / 1024) | round(2) }} MB"
          - "  - Created: {{ image_metadata.Created }}"
          - "  - Architecture: {{ image_metadata.Architecture }}"

    # =========================================================================
    # Phase 5: Authenticate to Quay Registry
    # =========================================================================
    - name: Authenticate to Quay registry
      ansible.builtin.command:
        cmd: podman login quay.io --username {{ quay_username }} --password-stdin
        stdin: "{{ quay_password }}"
      become: false  # Run as vpcuser for rootless podman
      no_log: true
      register: quay_login

    - name: Verify Quay authentication
      ansible.builtin.debug:
        msg: "✅ Authenticated to quay.io as {{ quay_username }}"

    # =========================================================================
    # Phase 6: Push to Quay Registry
    # =========================================================================
    - name: Push execution environment to Quay
      ansible.builtin.command:
        cmd: podman push {{ ee_full_image }}
      become: false  # Run as vpcuser for rootless podman
      register: ee_push
      async: 1800  # 30 minute timeout
      poll: 10

    - name: Display push output
      ansible.builtin.debug:
        msg: "{{ ee_push.stdout_lines }}"

    - name: Verify image in Quay registry
      ansible.builtin.uri:
        url: "https://quay.io/api/v1/repository/{{ quay_username }}/ocp4-aap-execution-environment"
        method: GET
        headers:
          Authorization: "Bearer {{ quay_api_token }}"
        validate_certs: yes
      register: quay_verify
      when: quay_api_token is defined

    # =========================================================================
    # Phase 7: Summary and Next Steps
    # =========================================================================
    - name: Display completion summary
      ansible.builtin.debug:
        msg:
          - "═══════════════════════════════════════════════════════════════"
          - "  Custom Execution Environment Build Complete ✅"
          - "═══════════════════════════════════════════════════════════════"
          - ""
          - "📦 Image Details:"
          - "   Repository: {{ ee_image_name }}"
          - "   Tag: {{ ee_image_tag }}"
          - "   Full Image: {{ ee_full_image }}"
          - "   Size: {{ (image_metadata.Size / 1024 / 1024) | round(2) }} MB"
          - ""
          - "🚀 Registry:"
          - "   URL: https://quay.io/repository/{{ quay_username }}/ocp4-aap-execution-environment"
          - "   Visibility: Private"
          - ""
          - "═══════════════════════════════════════════════════════════════"
          - "  Next Steps:"
          - "═══════════════════════════════════════════════════════════════"
          - ""
          - "  1. Configure Quay credential in AAP:"
          - "     - Name: Quay Custom EE Registry"
          - "     - Type: Container Registry"
          - "     - Registry URL: quay.io"
          - "     - Username: {{ quay_username }}"
          - ""
          - "  2. Create custom execution environment in AAP:"
          - "     ansible-playbook playbooks/configure-custom-ee-in-aap.yml"
          - ""
          - "  3. Test project sync:"
          - "     curl -k -u admin:<password> -X POST \\"
          - "       https://aap.{{ external_domain }}/api/controller/v2/projects/<id>/update/"
          - ""
          - "═══════════════════════════════════════════════════════════════"
