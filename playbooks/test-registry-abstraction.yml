- name: Test Summary
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Display test summary
      ansible.builtin.debug:
        msg:
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - "✅ Registry Abstraction Testing Complete"
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - ""
          - "Tested registry types:"
          - "  ✅ Quay (primary) - /ocp4/openshift4 paths"
          - "  ✅ Harbor (community) - /ocp4-project/openshift4 paths"
          - "  ✅ JFrog (community) - /ocp4-docker-local/openshift4 paths"
          - ""
          - "All registry-specific variables loaded successfully"
          - "Registry abstraction layer validates correctly"
