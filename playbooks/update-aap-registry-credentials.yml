---
# Update AAP 2.6 Installation with Red Hat Registry Credentials
# This reconfigures the Control Plane EE by updating the inventory and re-running setup.sh

- name: Update AAP Registry Credentials and Reconfigure
  hosts: localhost
  gather_facts: yes
  vars:
    aap_gateway_ip: "192.168.10.20"
    aap_install_dir: "/opt/ansible-automation-platform/installer"

    # Red Hat Registry Credentials (from vault)
    registry_username: "{{ rh_registry_username }}"
    registry_password: "{{ rh_registry_password }}"

  tasks:
    # =========================================================================
    # Phase 1: Backup Current Configuration
    # =========================================================================
    - name: Check if AAP installer directory exists
      ansible.builtin.stat:
        path: "{{ aap_install_dir }}"
      delegate_to: "{{ aap_gateway_ip }}"
      remote_user: ansible
      become: yes
      register: aap_dir

    - name: Fail if AAP installer not found
      ansible.builtin.fail:
        msg: |
          AAP installer directory not found at {{ aap_install_dir }}

          Expected structure:
          {{ aap_install_dir }}/
          └── ansible-automation-platform-containerized-setup-*/
              ├── inventory
              ├── setup.sh
              └── ...

          If AAP was installed from a different location, update aap_install_dir variable.
      when: not aap_dir.stat.exists

    - name: Set installer directory path
      ansible.builtin.set_fact:
        installer_path: "{{ aap_install_dir }}"

    - name: Verify installer path exists
      ansible.builtin.stat:
        path: "{{ installer_path }}/setup.sh"
      delegate_to: "{{ aap_gateway_ip }}"
      remote_user: ansible
      become: yes
      register: setup_script

    - name: Fail if setup.sh not found
      ansible.builtin.fail:
        msg: "setup.sh not found at {{ installer_path }}"
      when: not setup_script.stat.exists

    - name: Display installer path
      ansible.builtin.debug:
        msg: "Found AAP installer at: {{ installer_path }}"

    - name: Backup current inventory file
      ansible.builtin.copy:
        src: "{{ installer_path }}/inventory"
        dest: "{{ installer_path }}/inventory.backup.{{ ansible_date_time.iso8601_basic_short }}"
        remote_src: yes
      delegate_to: "{{ aap_gateway_ip }}"
      remote_user: ansible
      become: yes

    # =========================================================================
    # Phase 2: Read and Update Inventory File
    # =========================================================================
    - name: Read current inventory file
      ansible.builtin.slurp:
        src: "{{ installer_path }}/inventory"
      delegate_to: "{{ aap_gateway_ip }}"
      remote_user: ansible
      become: yes
      register: current_inventory

    - name: Parse inventory content
      ansible.builtin.set_fact:
        inventory_lines: "{{ (current_inventory.content | b64decode).split('\n') }}"

    - name: Check if registry credentials already exist
      ansible.builtin.set_fact:
        has_registry_url: "{{ inventory_lines | select('match', '^registry_url=') | list | length > 0 }}"
        has_registry_username: "{{ inventory_lines | select('match', '^registry_username=') | list | length > 0 }}"
        has_registry_password: "{{ inventory_lines | select('match', '^registry_password=') | list | length > 0 }}"

    - name: Display current registry configuration status
      ansible.builtin.debug:
        msg:
          - "Current inventory registry configuration:"
          - "  registry_url: {{ 'Present' if has_registry_url else 'Missing' }}"
          - "  registry_username: {{ 'Present' if has_registry_username else 'Missing' }}"
          - "  registry_password: {{ 'Present' if has_registry_password else 'Missing' }}"

    - name: Create updated inventory with registry credentials
      ansible.builtin.template:
        src: ../templates/aap/inventory-with-registry-creds.j2
        dest: "{{ installer_path }}/inventory"
        owner: ansible
        group: ansible
        mode: '0600'
      delegate_to: "{{ aap_gateway_ip }}"
      remote_user: ansible
      become: yes
      vars:
        original_inventory: "{{ current_inventory.content | b64decode }}"

    # =========================================================================
    # Phase 3: Re-run AAP Setup
    # =========================================================================
    - name: Display reconfiguration plan
      ansible.builtin.debug:
        msg:
          - "═══════════════════════════════════════════════════════════════"
          - "  AAP Registry Credentials Update Plan"
          - "═══════════════════════════════════════════════════════════════"
          - ""
          - "Action: Add Red Hat registry credentials to AAP inventory"
          - ""
          - "Changes:"
          - "  [all:vars] section will include:"
          - "    registry_url='registry.redhat.io'"
          - "    registry_username='{{ registry_username }}'"
          - "    registry_password='***REDACTED***'"
          - ""
          - "Impact:"
          - "  - Control Plane EE will be able to pull from registry.redhat.io"
          - "  - Project syncs will work without manual credential configuration"
          - "  - All AAP containers will be reconfigured with registry auth"
          - ""
          - "Next: Run setup.sh to apply changes..."
          - ""

    - name: Display reconfiguration notice
      ansible.builtin.debug:
        msg:
          - "⚠️  Reconfiguring AAP containers with registry credentials..."
          - "Expected duration: 5-10 minutes"
          - "AAP services will be restarted during this process"

    - name: Run AAP setup.sh to apply registry credentials
      ansible.builtin.shell: |
        cd {{ installer_path }}
        ./setup.sh -i inventory
      delegate_to: "{{ aap_gateway_ip }}"
      remote_user: ansible
      become: yes
      register: setup_result
      async: 1800  # 30 minute timeout
      poll: 30     # Check every 30 seconds

    - name: Display setup output
      ansible.builtin.debug:
        var: setup_result.stdout_lines

    # =========================================================================
    # Phase 4: Verify Configuration
    # =========================================================================
    - name: Wait for AAP services to be ready
      ansible.builtin.uri:
        url: "https://aap.{{ external_domain }}/api/gateway/v1/config/"
        method: GET
        validate_certs: no
        status_code: [200, 401]  # 401 is OK (not authenticated but service is up)
      register: aap_health
      until: aap_health.status in [200, 401]
      retries: 20
      delay: 15

    - name: Verify Control Plane EE can pull from registry.redhat.io
      ansible.builtin.shell: |
        podman login registry.redhat.io --get-login
      delegate_to: "{{ aap_gateway_ip }}"
      remote_user: ansible
      become: yes
      register: podman_auth_check
      failed_when: false

    - name: Display verification result
      ansible.builtin.debug:
        msg:
          - "Podman registry auth check:"
          - "{{ podman_auth_check.stdout }}"

    # =========================================================================
    # Summary
    # =========================================================================
    - name: Display completion summary
      ansible.builtin.debug:
        msg:
          - "═══════════════════════════════════════════════════════════════"
          - "  ✅ AAP Registry Credentials Update Complete"
          - "═══════════════════════════════════════════════════════════════"
          - ""
          - "Updated Configuration:"
          - "  Inventory: {{ installer_path }}/inventory"
          - "  Backup: {{ installer_path }}/inventory.backup.*"
          - ""
          - "Registry Credentials:"
          - "  URL: registry.redhat.io"
          - "  Username: {{ registry_username }}"
          - "  Status: ✅ Applied"
          - ""
          - "Next Steps:"
          - ""
          - "1. Test project sync:"
          - "   cd /home/vpcuser/ocp4-disconnected-helper"
          - "   ansible-playbook -i inventory/ibm-cloud.yml \\"
          - "     playbooks/import-project-with-custom-ee.yml \\"
          - "     -e@extra_vars/rhel-subscription-secrets.yml \\"
          - "     --vault-password-file ~/.vault_pass"
          - ""
          - "2. Verify in AAP Web UI:"
          - "   - Administration → Execution Environments"
          - "   - Check Control Plane EE → Should show registry credential"
          - "   - Projects → ocp4-disconnected-helper → Sync"
          - ""
          - "═══════════════════════════════════════════════════════════════"
