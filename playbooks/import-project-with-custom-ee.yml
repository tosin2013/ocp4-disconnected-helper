---
# Import ocp4-disconnected-helper using custom EE for project syncs
# Avoids Control Plane EE registry authentication issue

- name: Import Project with Custom Execution Environment
  hosts: localhost
  gather_facts: yes
  vars:
    aap_host: "https://aap.{{ external_domain }}"
    aap_validate_certs: false
    project_repo_url: "https://github.com/tosin2013/ocp4-disconnected-helper.git"

  tasks:
    # =========================================================================
    # Phase 1: Delete existing project if it exists
    # =========================================================================
    - name: Check if project exists
      ansible.controller.project:
        name: "ocp4-disconnected-helper"
        controller_host: "{{ aap_host }}"
        controller_username: "admin"
        controller_password: "{{ admin_password }}"
        validate_certs: "{{ aap_validate_certs }}"
        state: absent
      ignore_errors: true
      register: delete_project

    - name: Wait a moment for deletion to complete
      ansible.builtin.pause:
        seconds: 2
      when: delete_project is changed

    # =========================================================================
    # Phase 2: Create project with custom EE
    # =========================================================================
    - name: Create project with custom EE for syncs
      ansible.controller.project:
        name: "ocp4-disconnected-helper"
        description: "OpenShift 4 Disconnected Helper - Automated air-gapped deployments"
        organization: "Default"
        scm_type: "git"
        scm_url: "{{ project_repo_url }}"
        scm_branch: "main"
        scm_update_on_launch: true
        scm_clean: true
        default_environment: "OCP4 AAP Execution Environment"
        controller_host: "{{ aap_host }}"
        controller_username: "admin"
        controller_password: "{{ admin_password }}"
        validate_certs: "{{ aap_validate_certs }}"
        state: present
      register: aap_project

    - name: Display project creation result
      ansible.builtin.debug:
        msg:
          - "Project created with ID: {{ aap_project.id }}"
          - "Using custom EE for syncs: OCP4 AAP Execution Environment"

    # =========================================================================
    # Phase 3: Trigger project sync with custom EE
    # =========================================================================
    - name: Sync project using custom EE
      ansible.controller.project_update:
        project: "ocp4-disconnected-helper"
        controller_host: "{{ aap_host }}"
        controller_username: "admin"
        controller_password: "{{ admin_password }}"
        validate_certs: "{{ aap_validate_certs }}"
        wait: true
        timeout: 180
      register: project_sync

    - name: Display sync result
      ansible.builtin.debug:
        msg:
          - "✅ Project synced successfully"
          - "   Status: {{ project_sync.status }}"
          - "   Revision: {{ project_sync.job_data.scm_revision[:8] }}"
          - "   Execution Environment Used: {{ project_sync.job_data.summary_fields.execution_environment.name }}"

    # =========================================================================
    # Phase 4: Create Inventory
    # =========================================================================
    - name: Create KVM Hypervisor inventory
      ansible.controller.inventory:
        name: "KVM Hypervisor (Localhost)"
        description: "Local execution for libvirt VM provisioning"
        organization: "Default"
        controller_host: "{{ aap_host }}"
        controller_username: "admin"
        controller_password: "{{ admin_password }}"
        validate_certs: "{{ aap_validate_certs }}"
        state: present

    - name: Add localhost to inventory
      ansible.controller.host:
        name: "localhost"
        description: "Hypervisor host for VM provisioning"
        inventory: "KVM Hypervisor (Localhost)"
        variables:
          ansible_connection: local
          ansible_python_interpreter: /usr/bin/python3
        controller_host: "{{ aap_host }}"
        controller_username: "admin"
        controller_password: "{{ admin_password }}"
        validate_certs: "{{ aap_validate_certs }}"
        state: present

    # =========================================================================
    # Phase 5: Create Credentials
    # =========================================================================
    - name: Read SSH private key
      ansible.builtin.slurp:
        src: "/home/vpcuser/.ssh/id_rsa"
      register: ssh_private_key

    - name: Create VM SSH Key credential
      ansible.controller.credential:
        name: "VM SSH Key"
        description: "SSH access to provisioned VMs (ansible user)"
        organization: "Default"
        credential_type: "Machine"
        inputs:
          username: "ansible"
          ssh_key_data: "{{ ssh_private_key.content | b64decode }}"
          become_method: "sudo"
        controller_host: "{{ aap_host }}"
        controller_username: "admin"
        controller_password: "{{ admin_password }}"
        validate_certs: "{{ aap_validate_certs }}"
        state: present

    - name: Read Ansible Vault password
      ansible.builtin.slurp:
        src: "/home/vpcuser/.vault_pass"
      register: vault_password_file

    - name: Create Ansible Vault Password credential
      ansible.controller.credential:
        name: "Ansible Vault Password"
        description: "Decrypt extra_vars/rhel-subscription-secrets.yml"
        organization: "Default"
        credential_type: "Vault"
        inputs:
          vault_password: "{{ vault_password_file.content | b64decode | trim }}"
        controller_host: "{{ aap_host }}"
        controller_username: "admin"
        controller_password: "{{ admin_password }}"
        validate_certs: "{{ aap_validate_certs }}"
        state: present

    # =========================================================================
    # Phase 6: Create Job Templates
    # =========================================================================
    - name: Create oc-mirror job template
      ansible.controller.job_template:
        name: "OCP Image Mirror (oc-mirror to Disk)"
        description: "Mirror OpenShift container images to TAR file for air-gapped deployment"
        job_type: "run"
        inventory: "KVM Hypervisor (Localhost)"
        project: "ocp4-disconnected-helper"
        playbook: "playbooks/download-to-disk-v2.yml"
        execution_environment: "OCP4 AAP Execution Environment"
        credentials:
          - "VM SSH Key"
          - "Ansible Vault Password"
        extra_vars:
          ocp_version: "4.21"
          platform: "aws"
          mirror_storage_path: "/data/ocp-mirror"
          clean_mirror: false
        ask_variables_on_launch: true
        timeout: 7200
        concurrent_jobs_enabled: false
        controller_host: "{{ aap_host }}"
        controller_username: "admin"
        controller_password: "{{ admin_password }}"
        validate_certs: "{{ aap_validate_certs }}"
        state: present
      register: mirror_template

    - name: Create Deploy Registry VM job template
      ansible.controller.job_template:
        name: "Deploy Registry VM (mirror-registry)"
        description: "Provision and configure Quay mirror-registry VM via libvirt"
        job_type: "run"
        inventory: "KVM Hypervisor (Localhost)"
        project: "ocp4-disconnected-helper"
        playbook: "playbooks/deploy-registry.yml"
        execution_environment: "OCP4 AAP Execution Environment"
        credentials:
          - "VM SSH Key"
          - "Ansible Vault Password"
        extra_vars:
          registry_type: "mirror-registry"
        ask_variables_on_launch: true
        controller_host: "{{ aap_host }}"
        controller_username: "admin"
        controller_password: "{{ admin_password }}"
        validate_certs: "{{ aap_validate_certs }}"
        state: present
      register: registry_template

    # =========================================================================
    # Summary
    # =========================================================================
    - name: Display import summary
      ansible.builtin.debug:
        msg:
          - "═══════════════════════════════════════════════════════════════"
          - "  ✅ AAP Project Import Complete (Using Custom EE)"
          - "═══════════════════════════════════════════════════════════════"
          - ""
          - "📦 Project: ocp4-disconnected-helper"
          - "   Repository: {{ project_repo_url }}"
          - "   Branch: main"
          - "   Revision: {{ project_sync.job_data.scm_revision[:8] }}"
          - "   Sync Status: {{ project_sync.status }}"
          - "   Execution Environment: OCP4 AAP Execution Environment"
          - ""
          - "📋 Inventory: KVM Hypervisor (Localhost)"
          - "   Host: localhost (connection: local)"
          - ""
          - "🔑 Credentials:"
          - "   - VM SSH Key (ansible user)"
          - "   - Ansible Vault Password"
          - ""
          - "🚀 Job Templates:"
          - "   1. OCP Image Mirror (oc-mirror to Disk)"
          - "      - Playbook: playbooks/download-to-disk-v2.yml"
          - "      - Timeout: 2 hours"
          - "      - Custom EE: OCP4 AAP Execution Environment"
          - ""
          - "   2. Deploy Registry VM (mirror-registry)"
          - "      - Playbook: playbooks/deploy-registry.yml"
          - "      - Custom EE: OCP4 AAP Execution Environment"
          - ""
          - "═══════════════════════════════════════════════════════════════"
          - "  🎯 Key Achievement"
          - "═══════════════════════════════════════════════════════════════"
          - ""
          - "  ✅ Project syncs using CUSTOM EE from Quay"
          - "  ✅ No Control Plane EE credential configuration needed"
          - "  ✅ All job templates use custom EE with oc/kubectl tools"
          - "  ✅ Collections: kubernetes.core, aws, azure available"
          - ""
          - "🌐 AAP Web UI: {{ aap_host }}"
          - "   Resources → Templates → Launch a job!"
          - ""
          - "═══════════════════════════════════════════════════════════════"
