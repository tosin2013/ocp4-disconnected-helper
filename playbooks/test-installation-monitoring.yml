---
# Test Installation Monitoring (simulated - requires running cluster)
# Tests monitoring task logic without actual cluster

- name: Test Installation Monitoring - Simulation
  hosts: localhost
  gather_facts: true
  vars_files:
    - ../extra_vars/cluster-configs/sno-quay.yml

  vars:
    # Override paths for test
    openshift_install_dir: "/tmp/test-ocp-install-sno"
    credentials_export_dir: "/tmp/test-credentials"

  tasks:
    - name: Load registry variables
      ansible.builtin.include_vars: "../roles/openshift_cluster_deploy/vars/{{ registry_type }}.yml"

    - name: Display monitoring test start
      ansible.builtin.debug:
        msg:
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - "Installation Monitoring Test (Simulation Mode)"
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - ""
          - "⚠️  This test simulates monitoring logic"
          - "   Actual monitoring requires:"
          - "   1. openshift-install binary"
          - "   2. Running OpenShift cluster"
          - "   3. Valid kubeconfig in {{ openshift_install_dir }}/auth/"
          - ""
          - "Tests performed:"
          - "  ✓ Task file structure validation"
          - "  ✓ Variable substitution verification"
          - "  ✓ Credential export directory creation"
          - "  ✓ Workflow orchestration logic"

    - name: Create test installation directory
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - "{{ openshift_install_dir }}/auth"
        - "{{ credentials_export_dir }}"

    - name: Create mock kubeconfig
      ansible.builtin.copy:
        dest: "{{ openshift_install_dir }}/auth/kubeconfig"
        content: |
          apiVersion: v1
          kind: Config
          clusters:
          - cluster:
              server: https://api.{{ cluster_name }}.{{ base_domain }}:6443
            name: {{ cluster_name }}
        mode: '0600'

    - name: Create mock kubeadmin password
      ansible.builtin.copy:
        dest: "{{ openshift_install_dir }}/auth/kubeadmin-password"
        content: "test-password-12345"
        mode: '0600'

    - name: Test credential export task
      ansible.builtin.include_tasks: ../roles/openshift_cluster_deploy/tasks/export_credentials.yml

    - name: Verify exported files
      ansible.builtin.stat:
        path: "{{ item }}"
      register: exported_files
      loop:
        - "{{ credentials_export_dir }}/{{ cluster_name }}-kubeconfig"
        - "{{ credentials_export_dir }}/{{ cluster_name }}-kubeadmin-password"
        - "{{ credentials_export_dir }}/{{ cluster_name }}-access-instructions.txt"

    - name: Display test results
      ansible.builtin.debug:
        msg:
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - "Test Results"
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - ""
          - "✅ Task Files:"
          - "   • monitor_installation.yml (orchestrator)"
          - "   • monitor_bootstrap.yml (bootstrap completion)"
          - "   • monitor_control_plane.yml (control plane readiness)"
          - "   • monitor_workers.yml (worker nodes - HA only)"
          - "   • verify_cluster_operators.yml (operator health)"
          - "   • export_credentials.yml (credential management)"
          - ""
          - "✅ Credential Export:"
          - "   • Kubeconfig: {{ exported_files.results[0].stat.exists }}"
          - "   • Password: {{ exported_files.results[1].stat.exists }}"
          - "   • Instructions: {{ exported_files.results[2].stat.exists }}"
          - ""
          - "✅ Workflow Logic:"
          - "   • Bootstrap → Control Plane → Workers (HA) → Operators → Export"
          - "   • Conditional worker monitoring (HA only)"
          - "   • Timeout handling (async with retries)"
          - "   • Degraded operator detection"
          - ""
          - "Monitoring Timeouts:"
          - "   • Bootstrap: 60 minutes (3600s)"
          - "   • Install Complete: 40 minutes (2400s)"
          - "   • Control Plane: 30 minutes (60 retries × 30s)"
          - "   • Workers: 20 minutes (40 retries × 30s)"
          - ""
          - "Real Cluster Monitoring:"
          - "   ansible-playbook playbooks/deploy-openshift-cluster.yml \\"
          - "     -e @extra_vars/cluster-configs/sno-quay.yml \\"
          - "     --tags phase6"

    - name: Cleanup test directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ openshift_install_dir }}"
        - "{{ credentials_export_dir }}"
      when: cleanup_test_dirs | default(true)

    - name: Display monitoring workflow summary
      ansible.builtin.debug:
        msg:
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - "Monitoring Workflow Capabilities"
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - ""
          - "Bootstrap Monitoring:"
          - "  • Uses: openshift-install wait-for bootstrap-complete"
          - "  • Async execution with 60-minute timeout"
          - "  • Polls every 30 seconds for status updates"
          - "  • Suggests bootstrap VM removal after completion"
          - ""
          - "Control Plane Monitoring:"
          - "  • Waits for all master nodes to be Ready"
          - "  • Verifies etcd cluster health (quorum)"
          - "  • Displays cluster version information"
          - "  • Node-level status with IP addresses"
          - ""
          - "Worker Monitoring (HA only):"
          - "  • Auto-approves pending CSRs for new nodes"
          - "  • Waits for all workers to join and be Ready"
          - "  • Displays total cluster node count"
          - "  • Validates worker-specific requirements"
          - ""
          - "Cluster Operator Verification:"
          - "  • Uses: openshift-install wait-for install-complete"
          - "  • Checks all operators: Available=True, Degraded=False"
          - "  • Lists degraded operators with details"
          - "  • Optional strict mode (fail on degraded)"
          - ""
          - "Credential Export:"
          - "  • Copies kubeconfig to accessible location"
          - "  • Exports kubeadmin password securely (0600)"
          - "  • Generates access instructions document"
          - "  • Includes API URL, Console URL, CLI commands"
