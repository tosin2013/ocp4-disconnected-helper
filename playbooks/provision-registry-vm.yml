---
# Provision Registry VM using community.libvirt
# ADR Reference: ADR 0023 - Pure Ansible with community.libvirt Migration
#
# This playbook creates a dedicated VM for hosting the container registry
# (mirror-registry/Quay, Harbor, or JFrog) using community.libvirt collection.
#
# Prerequisites:
#   - community.libvirt collection installed
#   - libvirt/KVM running
#   - CentOS Stream 10 base image available
#   - xorriso installed (for cloud-init ISO)
#
# Usage:
#   # Create registry VM with defaults
#   ansible-playbook -i inventory/ibm-cloud.yml playbooks/provision-registry-vm.yml
#
#   # Create with custom specs
#   ansible-playbook -i inventory/ibm-cloud.yml playbooks/provision-registry-vm.yml \
#       -e "vm_memory=16384" \
#       -e "vm_disk_size=1000"
#
#   # Delete registry VM
#   ansible-playbook -i inventory/ibm-cloud.yml playbooks/provision-registry-vm.yml \
#       -e "vm_action=delete"

- name: Provision Registry VM with community.libvirt
  hosts: localhost
  gather_facts: yes
  become: no  # Don't become root at play level - we'll use it per-task

  vars:
    # Get the actual user running the playbook (before any become)
    actual_user: "{{ lookup('env', 'USER') }}"
    actual_home: "{{ lookup('env', 'HOME') }}"

    # VM Configuration
    vm_name: "registry-vm"
    vm_hostname: "registry"
    vm_domain: "{{ ocp_cluster_name }}.{{ external_domain | default('disconnected.local') }}"
    vm_fqdn: "{{ vm_hostname }}.{{ vm_domain }}"
    vm_user: "registry"

    # VM Resources
    vm_memory: 8192          # 8GB RAM
    vm_cpus: 4
    vm_disk_size: 500        # 500GB for images
    vm_network: "default"

    # Static IP (from inventory)
    vm_ip: "{{ quay_vm_ip }}"

    # Base image and paths
    base_image_url: "https://cloud.centos.org/centos/10-stream/x86_64/images/CentOS-Stream-GenericCloud-10-latest.x86_64.qcow2"
    base_image_path: "/var/lib/libvirt/images/centos10-stream-base.qcow2"
    vm_disk: "/var/lib/libvirt/images/{{ vm_name }}.qcow2"
    cloud_init_iso: "/var/lib/libvirt/images/{{ vm_name }}-cloud-init.iso"

    # SSH key for access (use actual user's key, not root's)
    ssh_public_key: "{{ lookup('file', actual_home + '/.ssh/id_rsa.pub', errors='warn') | default('') }}"
    ssh_private_key: "{{ actual_home }}/.ssh/id_rsa"

    # Action: create, delete, info
    vm_action: "create"

    # Wait timeout
    vm_wait_timeout: 600

  tasks:
    # =========================================================================
    # Prerequisites Check
    # =========================================================================
    - name: Check if community.libvirt collection is installed
      ansible.builtin.command:
        cmd: ansible-galaxy collection list community.libvirt
      register: libvirt_collection
      failed_when: false
      changed_when: false

    - name: Fail if community.libvirt not installed
      ansible.builtin.fail:
        msg: |
          community.libvirt collection not found!
          Install with: ansible-galaxy collection install community.libvirt
      when: libvirt_collection.rc != 0

    - name: Check if xorriso is installed
      ansible.builtin.command:
        cmd: which xorriso
      register: xorriso_check
      failed_when: false
      changed_when: false

    - name: Fail if xorriso not installed
      ansible.builtin.fail:
        msg: |
          xorriso not found!
          Install with: dnf install -y xorriso
      when: xorriso_check.rc != 0

    - name: Verify SSH public key exists
      ansible.builtin.fail:
        msg: |
          SSH public key not found at ~/.ssh/id_rsa.pub
          Generate one with: ssh-keygen -t rsa -b 4096
      when: ssh_public_key == ''

    # =========================================================================
    # Delete VM (if requested)
    # =========================================================================
    - name: Delete registry VM
      when: vm_action == "delete"
      become: yes  # Need root for libvirt operations
      block:
        - name: Check if VM exists
          community.libvirt.virt:
            command: list_vms
          register: all_vms

        - name: Destroy VM if running
          community.libvirt.virt:
            name: "{{ vm_name }}"
            state: destroyed
          when: vm_name in all_vms.list_vms
          ignore_errors: yes

        - name: Undefine VM
          community.libvirt.virt:
            name: "{{ vm_name }}"
            command: undefine
          when: vm_name in all_vms.list_vms
          ignore_errors: yes

        - name: Delete VM disk
          ansible.builtin.file:
            path: "{{ vm_disk }}"
            state: absent

        - name: Delete cloud-init ISO
          ansible.builtin.file:
            path: "{{ cloud_init_iso }}"
            state: absent

        - name: Display delete result
          ansible.builtin.debug:
            msg: "✅ VM {{ vm_name }} deleted"
          when: vm_name in all_vms.list_vms

        - name: VM does not exist
          ansible.builtin.debug:
            msg: "VM {{ vm_name }} does not exist"
          when: vm_name not in all_vms.list_vms

        - name: End play after delete
          ansible.builtin.meta: end_play

    # =========================================================================
    # Get VM Info (if requested)
    # =========================================================================
    - name: Get VM info
      when: vm_action == "info"
      block:
        - name: Check if VM exists
          community.libvirt.virt:
            command: list_vms
          register: all_vms

        - name: Get VM info
          community.libvirt.virt:
            command: info
          register: vm_info
          when: vm_name in all_vms.list_vms

        - name: Display VM info
          ansible.builtin.debug:
            var: vm_info
          when: vm_name in all_vms.list_vms

        - name: VM does not exist
          ansible.builtin.debug:
            msg: "VM {{ vm_name }} does not exist"
          when: vm_name not in all_vms.list_vms

        - name: End play after info
          ansible.builtin.meta: end_play

    # =========================================================================
    # Check if VM Already Exists (Idempotency)
    # =========================================================================
    - name: Check if VM already exists
      community.libvirt.virt:
        command: list_vms
      register: existing_vms
      become: yes

    - name: VM already exists
      when: vm_name in existing_vms.list_vms
      block:
        - name: Display existing VM message
          ansible.builtin.debug:
            msg:
              - "✅ VM {{ vm_name }} already exists (idempotent - no changes made)"
              - "Expected IP: {{ vm_ip }}"
              - ""
              - "To recreate, first delete:"
              - "  ansible-playbook provision-registry-vm.yml -e 'vm_action=delete'"
              - ""
              - "To view info:"
              - "  virsh dominfo {{ vm_name }}"

        - name: End play if VM exists
          ansible.builtin.meta: end_play

    # =========================================================================
    # Download Base Image
    # =========================================================================
    - name: Check if base image exists
      ansible.builtin.stat:
        path: "{{ base_image_path }}"
      register: base_image_stat
      become: yes

    - name: Download CentOS Stream 10 base image
      ansible.builtin.get_url:
        url: "{{ base_image_url }}"
        dest: "{{ base_image_path }}"
        mode: '0644'
        timeout: 3600
      when: not base_image_stat.stat.exists
      become: yes

    # =========================================================================
    # Create VM Disk from Base Image
    # =========================================================================
    - name: Create VM disk from base image
      ansible.builtin.command:
        cmd: qemu-img create -f qcow2 -F qcow2 -b {{ base_image_path }} {{ vm_disk }} {{ vm_disk_size }}G
      args:
        creates: "{{ vm_disk }}"
      become: yes

    - name: Set VM disk permissions
      ansible.builtin.file:
        path: "{{ vm_disk }}"
        owner: qemu
        group: qemu
        mode: '0644'
      become: yes

    # =========================================================================
    # Generate Cloud-Init Files
    # =========================================================================
    - name: Create temporary directory for cloud-init
      ansible.builtin.tempfile:
        state: directory
        prefix: cloud-init-
      register: cloud_init_tmpdir

    - name: Generate cloud-init user-data
      ansible.builtin.template:
        src: ../templates/cloud-init/registry-user-data.yml.j2
        dest: "{{ cloud_init_tmpdir.path }}/user-data"
        mode: '0600'

    - name: Generate cloud-init meta-data
      ansible.builtin.template:
        src: ../templates/cloud-init/registry-meta-data.yml.j2
        dest: "{{ cloud_init_tmpdir.path }}/meta-data"
        mode: '0600'

    - name: Generate cloud-init network-config
      ansible.builtin.template:
        src: ../templates/cloud-init/registry-network-config.yml.j2
        dest: "{{ cloud_init_tmpdir.path }}/network-config"
        mode: '0600'

    # =========================================================================
    # Create Cloud-Init ISO
    # =========================================================================
    - name: Create cloud-init ISO
      ansible.builtin.command:
        cmd: >
          xorriso -as genisoimage
          -output {{ cloud_init_iso }}
          -volid cidata
          -joliet
          -rock
          {{ cloud_init_tmpdir.path }}/user-data
          {{ cloud_init_tmpdir.path }}/meta-data
          {{ cloud_init_tmpdir.path }}/network-config
      args:
        creates: "{{ cloud_init_iso }}"
      become: yes

    - name: Set cloud-init ISO permissions
      ansible.builtin.file:
        path: "{{ cloud_init_iso }}"
        owner: qemu
        group: qemu
        mode: '0644'
      become: yes

    - name: Clean up temporary directory
      ansible.builtin.file:
        path: "{{ cloud_init_tmpdir.path }}"
        state: absent

    # =========================================================================
    # Define VM in libvirt
    # =========================================================================
    - name: Generate VM XML definition
      ansible.builtin.template:
        src: ../templates/libvirt/registry-vm.xml.j2
        dest: "/tmp/{{ vm_name }}.xml"
        mode: '0644'

    - name: Define VM in libvirt
      community.libvirt.virt:
        command: define
        xml: "{{ lookup('template', '../templates/libvirt/registry-vm.xml.j2') }}"
      become: yes

    - name: Start VM
      community.libvirt.virt:
        name: "{{ vm_name }}"
        state: running
      become: yes

    - name: Set VM to autostart
      community.libvirt.virt:
        name: "{{ vm_name }}"
        autostart: yes
      become: yes

    # =========================================================================
    # Wait for VM to be Ready
    # =========================================================================
    - name: Wait for VM to boot (static IP)
      ansible.builtin.pause:
        seconds: 30
        prompt: "Waiting for VM to boot with static IP {{ vm_ip }}"

    - name: Display configured static IP
      ansible.builtin.debug:
        msg:
          - "🌐 VM Static IP: {{ vm_ip }}"
          - "   Configured via cloud-init network-config"
          - "   Gateway: 192.168.122.1"

    - name: Wait for SSH to be available on static IP
      ansible.builtin.wait_for:
        host: "{{ vm_ip }}"
        port: 22
        timeout: "{{ vm_wait_timeout }}"
        state: started

    - name: Wait for cloud-init to complete
      ansible.builtin.shell: |
        ssh -i {{ ssh_private_key }} \
          -o StrictHostKeyChecking=no \
          -o UserKnownHostsFile=/dev/null \
          -o IdentitiesOnly=yes \
          root@{{ vm_ip }} 'cloud-init status --wait'
      register: cloud_init_status
      retries: 20
      delay: 30
      until: cloud_init_status.rc == 0
      changed_when: false
      ignore_errors: yes
      become: no  # Run as actual user to use their SSH key

    - name: Get actual VM IP (cloud-init network-config may not apply)
      ansible.builtin.shell: |
        virsh domifaddr {{ vm_name }} | grep -oP '192\.168\.122\.\d+' | head -n1
      register: vm_actual_ip
      changed_when: false
      become: yes

    - name: Apply static IP if cloud-init didn't configure it
      ansible.builtin.shell: |
        ssh -i {{ ssh_private_key }} \
          -o StrictHostKeyChecking=no \
          -o UserKnownHostsFile=/dev/null \
          -o ConnectTimeout=10 \
          root@{{ vm_actual_ip.stdout }} \
          'nmcli con delete ens3 2>/dev/null || true && \
           nmcli con add type ethernet con-name enp1s0-static ifname enp1s0 \
             ipv4.addresses {{ vm_ip }}/24 \
             ipv4.gateway 192.168.122.1 \
             ipv4.dns "192.168.122.1 8.8.8.8" \
             ipv4.method manual && \
           nmcli con up enp1s0-static'
      when: vm_actual_ip.stdout != vm_ip
      register: static_ip_applied
      become: no

    - name: Wait for static IP to be active
      ansible.builtin.pause:
        seconds: 5
      when: static_ip_applied.changed

    - name: Verify registry VM is ready
      ansible.builtin.shell: |
        ssh -i {{ ssh_private_key }} \
          -o StrictHostKeyChecking=no \
          -o UserKnownHostsFile=/dev/null \
          -o IdentitiesOnly=yes \
          root@{{ vm_ip }} 'cat /var/log/registry-vm-ready'
      register: registry_ready
      changed_when: false
      become: no  # Run as actual user to use their SSH key

    # =========================================================================
    # Update Inventory
    # =========================================================================
    - name: Add registry VM to runtime inventory
      ansible.builtin.add_host:
        name: "{{ vm_fqdn }}"
        ansible_host: "{{ vm_ip }}"
        ansible_user: root
        ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
        groups: registry

    # =========================================================================
    # Summary
    # =========================================================================
    - name: Display summary
      ansible.builtin.debug:
        msg:
          - "=============================================="
          - "✅ Registry VM Created Successfully"
          - "=============================================="
          - ""
          - "VM Name:     {{ vm_name }}"
          - "Hostname:    {{ vm_fqdn }}"
          - "IP Address:  {{ vm_ip }} (static)"
          - "Memory:      {{ vm_memory }}MB ({{ vm_memory // 1024 }}GB)"
          - "CPUs:        {{ vm_cpus }}"
          - "Disk:        {{ vm_disk_size }}GB"
          - ""
          - "🔗 HAProxy Backend:"
          - "   Static IP: {{ vm_ip }} ✅"
          - "   Matches inventory configuration"
          - "   HAProxy will route to this address"
          - ""
          - "🔐 SSH Access:"
          - "   ssh root@{{ vm_ip }}"
          - "   ssh {{ vm_user }}@{{ vm_ip }}"
          - ""
          - "🚀 Next Steps:"
          - "   1. Deploy mirror-registry:"
          - "      ansible-playbook -i inventory/ibm-cloud.yml setup-mirror-registry.yml"
          - ""
          - "   2. Access via HAProxy:"
          - "{% if deployment_type == 'cloud' %}      https://{{ quay_url }}{% else %}      http://{{ external_ip | default(kvm_host_ip) }}:{{ quay_external_port }}{% endif %}"
          - ""
          - "   3. Verify HAProxy routing:"
          - "      curl -k https://{{ quay_url }}/health/instance"
          - ""
          - "=============================================="

    - name: Save VM information to file
      ansible.builtin.copy:
        content: |
          # Registry VM Information
          # Generated: {{ ansible_date_time.iso8601 }}

          VM Name: {{ vm_name }}
          Hostname: {{ vm_fqdn }}
          IP Address: {{ vm_ip }} (static)
          Network: 192.168.122.0/24
          Gateway: 192.168.122.1

          Resources:
          - Memory: {{ vm_memory }}MB
          - CPUs: {{ vm_cpus }}
          - Disk: {{ vm_disk_size }}GB

          SSH Access:
            ssh root@{{ vm_ip }}
            ssh {{ vm_user }}@{{ vm_ip }}

          HAProxy Backend:
            Backend IP: {{ vm_ip }}
            Backend Port: {{ quay_vm_port }}
            External URL: {% if deployment_type == 'cloud' %}https://{{ quay_url }}{% else %}http://{{ kvm_host_ip }}:{{ quay_external_port }}{% endif %}

          Libvirt Commands:
            virsh list --all
            virsh dominfo {{ vm_name }}
            virsh console {{ vm_name }}
            virsh domifaddr {{ vm_name }}
        dest: "/tmp/{{ vm_name }}-info.txt"
        mode: '0644'
