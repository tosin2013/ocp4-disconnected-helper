---
# Deploy Ansible Automation Platform 2.6 Containerized
# End-to-end: Register RHEL → Download AAP → Install AAP
# Uses: infra.aap_utilities collection

- name: Deploy AAP 2.6 Containerized (End-to-End)
  hosts: aap-vm
  become: yes
  gather_facts: yes

  vars:
    # =========================================================================
    # AAP Installation Configuration
    # =========================================================================
    aap_version: "2.6"
    aap_setup_containerized: true
    aap_setup_rhel_version: 9
    aap_setup_down_type: "setup"  # 'setup' = online installer, 'setup-bundle' = offline
    aap_setup_working_dir: "/home/ansible/aap"
    aap_setup_inst_force: true  # Force installation (skip health check - workaround for collection bug)

    # Red Hat API offline token (required for installer download)
    # Generate at: https://access.redhat.com/management/api/
    aap_setup_down_offline_token: "{{ aap_setup_down_offline_token | default(lookup('env', 'AAP_OFFLINE_TOKEN'), true) }}"

    # Admin credentials
    aap_admin_password: "{{ aap_admin_password | default(lookup('env', 'AAP_ADMIN_PASSWORD'), true) | default('RedHat123!', true) }}"
    aap_pg_password: "{{ aap_pg_password | default(lookup('env', 'AAP_PG_PASSWORD'), true) | default('RedHat123!', true) }}"

    # =========================================================================
    # Red Hat Subscription Configuration (ADR 0027)
    # =========================================================================
    # PREFERRED: Activation Key (loaded from vault file)
    # Usage: -e @extra_vars/rhel-subscription-secrets.yml --vault-password-file ~/.vault_pass
    #
    # rhsm_org_id and rhsm_activationkey should be defined in vault file
    # See: extra_vars/rhel-subscription-secrets.yml.example
    #
    # FALLBACK: Environment variables (not recommended, use activation keys)
    rhsm_username: "{{ lookup('env', 'RHSM_USERNAME') | default('', true) }}"
    rhsm_password: "{{ lookup('env', 'RHSM_PASSWORD') | default('', true) }}"

    # =========================================================================
    # AAP Inventory Configuration (All-in-One Single Node)
    # =========================================================================
    aap_setup_prep_inv_nodes:
      automationcontroller:
        "{{ inventory_hostname }}":  # Use inventory hostname (resolved at runtime)

    aap_setup_prep_inv_vars:
      all:
        # Admin credentials
        admin_password: "{{ aap_admin_password }}"
        pg_password: "{{ aap_pg_password }}"

        # Containerized installation settings
        postgresql_admin_username: postgres
        postgresql_admin_password: "{{ aap_pg_password }}"

        # Red Hat registry authentication (for pulling AAP container images)
        # Note: Requires Red Hat registry service account or pull secret
        # For now, disable registry auth - installer will use subscription credentials
        registry_auth: false

        # Bundle container images path (for offline install)
        # bundle_install: false  # Set to true if using setup-bundle

  pre_tasks:
    # =========================================================================
    # System Information
    # =========================================================================
    - name: Display deployment information
      ansible.builtin.debug:
        msg:
          - "════════════════════════════════════════════════════════════════"
          - "Deploying AAP {{ aap_version }} Containerized"
          - "════════════════════════════════════════════════════════════════"
          - "Target Host: {{ ansible_fqdn }} ({{ ansible_default_ipv4.address }})"
          - "OS: {{ ansible_distribution }} {{ ansible_distribution_version }}"
          - "Installer Type: {{ 'Offline Bundle' if aap_setup_down_type == 'setup-bundle' else 'Online' }}"
          - "Working Directory: {{ aap_setup_working_dir }}"

    # =========================================================================
    # Red Hat Subscription Management
    # =========================================================================
    - name: Check subscription status
      ansible.builtin.command: subscription-manager status
      register: subscription_status
      failed_when: false
      changed_when: false

    - name: Register with Red Hat (username/password)
      community.general.redhat_subscription:
        state: present
        username: "{{ rhsm_username }}"
        password: "{{ rhsm_password }}"
        auto_attach: true
      when:
        - "'Overall Status: Current' not in subscription_status.stdout"
        - rhsm_username != ''
        - rhsm_password != ''
      no_log: true

    - name: Register with Red Hat (activation key)
      community.general.redhat_subscription:
        state: present
        org_id: "{{ rhsm_org_id }}"
        activationkey: "{{ rhsm_activationkey }}"
      when:
        - "'Overall Status: Current' not in subscription_status.stdout"
        - rhsm_org_id != ''
        - rhsm_activationkey != ''
      no_log: true

    - name: Fail if not registered and no credentials provided
      ansible.builtin.fail:
        msg: |
          System is not registered with Red Hat.

          RECOMMENDED: Use Activation Key (ADR 0027)

          1. Create activation key: https://access.redhat.com/management/activation_keys
          2. Copy template: cp extra_vars/rhel-subscription-secrets.yml.example extra_vars/rhel-subscription-secrets.yml
          3. Fill in your values
          4. Encrypt: ansible-vault encrypt extra_vars/rhel-subscription-secrets.yml
          5. Re-run playbook:
             ansible-playbook -i inventory/ibm-cloud.yml playbooks/deploy-aap.yml \
               --vault-password-file ~/.vault_pass \
               -e @extra_vars/rhel-subscription-secrets.yml

          FALLBACK: Environment Variables (not recommended)

          export RHSM_ORG_ID='your-org-id'
          export RHSM_ACTIVATIONKEY='your-activation-key'

          Then re-run the playbook.
      when:
        - "'Overall Status: Current' not in subscription_status.stdout"
        - (rhsm_org_id is not defined or rhsm_activationkey is not defined)
        - (rhsm_username == '' or rhsm_password == '')

    # =========================================================================
    # Enable Required Repositories
    # =========================================================================
    - name: Enable required RHEL 9 repositories
      community.general.rhsm_repository:
        name:
          - rhel-9-for-x86_64-baseos-rpms
          - rhel-9-for-x86_64-appstream-rpms
          - ansible-automation-platform-2.6-for-rhel-9-x86_64-rpms
        state: enabled

    # =========================================================================
    # Install Prerequisites
    # =========================================================================
    - name: Install AAP prerequisites
      ansible.builtin.dnf:
        name:
          - ansible-core
          - podman
          - python3
          - python3-pip
          - git
          - wget
          - curl
        state: present
        update_cache: yes

    - name: Create working directory
      ansible.builtin.file:
        path: "{{ aap_setup_working_dir }}"
        state: directory
        owner: ansible
        group: ansible
        mode: '0755'

  roles:
    # =========================================================================
    # AAP Installation Roles (from infra.aap_utilities collection)
    # =========================================================================
    - role: infra.aap_utilities.aap_setup_download
      when: aap_setup_down_type != 'setup-bundle'  # Skip if using offline bundle

    - role: infra.aap_utilities.aap_setup_prepare

    - role: infra.aap_utilities.aap_setup_install

  post_tasks:
    # =========================================================================
    # Installation Summary
    # =========================================================================
    - name: Display installation summary
      ansible.builtin.debug:
        msg:
          - "════════════════════════════════════════════════════════════════"
          - "✅ AAP {{ aap_version }} Installation Complete!"
          - "════════════════════════════════════════════════════════════════"
          - ""
          - "Access AAP Web UI:"
          - "  URL: https://{{ ansible_fqdn }}"
          - "  Username: admin"
          - "  Password: {{ aap_admin_password }}"
          - ""
          - "SSH Access:"
          - "  ssh ansible@{{ ansible_default_ipv4.address }}"
          - ""
          - "Container Services:"
          - "  podman ps  # View running containers"
          - "  systemctl status automation-controller  # Check service status"
          - ""
          - "Documentation:"
          - "  Local: docs/AAP_DEPLOYMENT_GUIDE.md"
          - "  Red Hat: https://docs.redhat.com/en/documentation/red_hat_ansible_automation_platform/2.6/"
          - ""
