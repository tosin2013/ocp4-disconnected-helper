- name: Test Validation Summary
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Display test summary
      ansible.builtin.debug:
        msg:
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - "✅ Topology Validation Testing Complete"
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - ""
          - "Tested topologies:"
          - "  ✅ SNO (Quay) - 1 control plane, 0 workers"
          - "  ✅ Compact (Quay) - 3 control plane schedulable, 0 workers"
          - "  ✅ Compact (Harbor) - 3 control plane schedulable, 0 workers"
          - "  ✅ Compact (JFrog) - 3 control plane schedulable, 0 workers"
          - "  ✅ HA (Quay) - 3 control plane + 3 workers"
          - "  ✅ HA (Harbor) - 3 control plane + 3 workers"
          - ""
          - "All topology validations passed successfully"
          - "Multi-registry support validated (Quay, Harbor, JFrog)"
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
