---
# Test Topology Validation for SNO, Compact, and HA Configurations
# Validates that topology requirements are correctly enforced

- name: Test Topology Validation - SNO
  hosts: localhost
  gather_facts: false
  vars_files:
    - ../extra_vars/cluster-configs/sno-quay.yml

  tasks:
    - name: Include topology validation
      ansible.builtin.include_role:
        name: openshift_cluster_deploy
        tasks_from: validate_topology
      tags: [validate-sno]

- name: Test Topology Validation - Compact (Quay)
  hosts: localhost
  gather_facts: false
  vars_files:
    - ../extra_vars/cluster-configs/compact-3node-quay.yml

  tasks:
