---
# IBM Cloud Deployment Inventory
# External Floating IP: 169.59.190.3
# VSI Internal IP: 10.241.64.9

all:
  vars:
    # ============================================================
    # DEPLOYMENT TYPE
    # ============================================================
    deployment_type: "cloud"  # Cloud mode (IBM Cloud VSI with Floating IP)

    # ============================================================
    # IBM CLOUD NETWORKING
    # ============================================================
    # Floating IP (public, assigned to VSI)
    external_ip: "169.59.190.3"

    # VSI internal IP (private network)
    internal_ip: "10.241.64.9"

    # ============================================================
    # DNS CONFIGURATION
    # ============================================================
    # Domain managed via AWS Route53
    external_domain: "sandbox3377.opentlc.com"
    ocp_cluster_name: "ocp4"

    # Service URLs (DNS records should point to {{ external_ip }})
    quay_url: "registry.{{ ocp_cluster_name }}.{{ external_domain }}"     # registry.ocp.example.com
    harbor_url: "harbor.{{ ocp_cluster_name }}.{{ external_domain }}"     # harbor.ocp.example.com
    jfrog_url: "jfrog.{{ ocp_cluster_name }}.{{ external_domain }}"       # jfrog.ocp.example.com
    aap_url: "aap.{{ external_domain }}"                                  # aap.example.com
    ocp_api_url: "api.{{ ocp_cluster_name }}.{{ external_domain }}"      # api.ocp.example.com
    ocp_apps_wildcard: "*.apps.{{ ocp_cluster_name }}.{{ external_domain }}"  # *.apps.ocp.example.com
    cockpit_url: "cockpit.{{ external_domain }}"                          # cockpit.example.com

    # ============================================================
    # SSL/TLS CONFIGURATION
    # ============================================================
    # Options: "letsencrypt", "selfsigned", "custom"
    ssl_cert_provider: "letsencrypt"  # Use Let's Encrypt with Route53 DNS validation
    letsencrypt_email: "admin@{{ external_domain }}"

    # ============================================================
    # BACKEND VM IPs (Internal Network on KVM Host)
    # ============================================================
    # Quay/mirror-registry VM
    quay_vm_ip: "192.168.122.5"
    quay_vm_port: 8443  # Mirror-registry default port

    # Harbor VM
    harbor_vm_ip: "192.168.122.10"
    harbor_vm_port: 443

    # JFrog Artifactory VM
    jfrog_vm_ip: "192.168.122.20"
    jfrog_vm_port: 8082
    jfrog_docker_port: 5001

    # AAP Controller VM
    aap_vm_ip: "192.168.122.30"
    aap_vm_port: 443

    # OpenShift Master Nodes
    ocp_master_ips:
      - "192.168.122.100"
      - "192.168.122.101"
      - "192.168.122.102"

    # OpenShift Worker Nodes
    ocp_worker_ips:
      - "192.168.122.110"
      - "192.168.122.111"

    # ============================================================
    # HAPROXY CONFIGURATION
    # ============================================================
    haproxy_stats_port: 9000
    haproxy_stats_user: "admin"
    haproxy_stats_password: "{{ vault_haproxy_stats_password | default('changeme') }}"

    # ============================================================
    # IBM CLOUD SECURITY GROUP PORTS (for reference)
    # ============================================================
    # These ports should be open in IBM Cloud Security Group:
    # - 22    (SSH - restricted to your IP)
    # - 80    (HTTP - Let's Encrypt ACME challenge)
    # - 443   (HTTPS - All services with SNI routing)
    # - 6443  (OpenShift API)
    # - 9090  (Cockpit)
    # - 9000  (HAProxy stats - optional, restrict to your IP)

  hosts:
    kvm-host:
      # SSH connection uses internal IP (you're already inside VSI)
      ansible_host: "{{ internal_ip }}"
      ansible_user: "root"
      ansible_connection: "local"  # Running playbook ON the KVM host

  children:
    registry_vms:
      hosts:
        registry:
          ansible_host: "192.168.122.26"
          ansible_user: "root"
          ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'

# ============================================================
# DNS RECORDS REQUIRED (Point to {{ external_ip }})
# ============================================================
# Create these DNS records in your DNS provider:
#
# A Records:
# registry.ocp.example.com    → 169.59.190.3
# harbor.ocp.example.com      → 169.59.190.3
# jfrog.ocp.example.com       → 169.59.190.3
# aap.example.com             → 169.59.190.3
# api.ocp.example.com         → 169.59.190.3
# cockpit.example.com         → 169.59.190.3
#
# Wildcard (for OpenShift routes):
# *.apps.ocp.example.com      → 169.59.190.3
#
# ============================================================

# ============================================================
# QUICK START INSTRUCTIONS
# ============================================================
# 1. Edit this file:
#    - Change external_domain to your actual domain
#    - Update letsencrypt_email
#
# 2. Create DNS records (see above)
#
# 3. Setup HAProxy:
#    ansible-playbook -i inventory/ibm-cloud.yml playbooks/setup-haproxy.yml
#
# 4. Provision VMs:
#    ansible-playbook -i inventory/ibm-cloud.yml playbooks/provision-registry-vm.yml
#    ansible-playbook -i inventory/ibm-cloud.yml playbooks/provision-aap-vm.yml
#
# 5. Access services:
#    Quay:     https://registry.ocp.example.com
#    AAP:      https://aap.example.com
#    Cockpit:  https://cockpit.example.com:9090
#    OCP API:  https://api.ocp.example.com:6443
#
# ============================================================
