---
# Phase 1: Prepare Installation Directory

- name: Create installation directory
  ansible.builtin.file:
    path: "{{ openshift_install_dir }}"
    state: directory
    mode: '0755'

- name: Create ISO output directory
  ansible.builtin.file:
    path: "{{ iso_output_path }}"
    state: directory
    mode: '0755'

- name: Create manifests directory
  ansible.builtin.file:
    path: "{{ manifests_dir }}"
    state: directory
    mode: '0755'

- name: Clean up previous installation artifacts
  ansible.builtin.file:
    path: "{{ openshift_install_dir }}/{{ item }}"
    state: absent
  loop:
    - .openshift_install.log
    - .openshift_install_state.json
    - auth
    - metadata.json

- name: Display preparation summary
  ansible.builtin.debug:
    msg:
      - "Installation directory: {{ openshift_install_dir }}"
      - "ISO output path: {{ iso_output_path }}"
      - "Manifests directory: {{ manifests_dir }}"
