---
# Export cluster credentials to accessible location

- name: Display credential export start
  ansible.builtin.debug:
    msg:
      - "📋 Exporting cluster credentials..."
      - "   Kubeconfig and kubeadmin password will be copied to accessible location"

- name: Create credentials export directory
  ansible.builtin.file:
    path: "{{ credentials_export_dir | default('/data/ocp-credentials') }}"
    state: directory
    mode: '0700'
  delegate_to: localhost

- name: Copy kubeconfig to export directory
  ansible.builtin.copy:
    src: "{{ openshift_install_dir }}/auth/kubeconfig"
    dest: "{{ credentials_export_dir | default('/data/ocp-credentials') }}/{{ cluster_name }}-kubeconfig"
    mode: '0600'
    remote_src: true
  delegate_to: localhost

- name: Copy kubeadmin password to export directory
  ansible.builtin.copy:
    src: "{{ openshift_install_dir }}/auth/kubeadmin-password"
    dest: "{{ credentials_export_dir | default('/data/ocp-credentials') }}/{{ cluster_name }}-kubeadmin-password"
    mode: '0600'
    remote_src: true
  delegate_to: localhost

- name: Read kubeadmin password
  ansible.builtin.slurp:
    src: "{{ openshift_install_dir }}/auth/kubeadmin-password"
  register: kubeadmin_password_encoded
  delegate_to: localhost

- name: Set kubeadmin password fact
  ansible.builtin.set_fact:
    kubeadmin_password: "{{ kubeadmin_password_encoded.content | b64decode | trim }}"

- name: Create cluster access instructions file
  ansible.builtin.copy:
    dest: "{{ credentials_export_dir | default('/data/ocp-credentials') }}/{{ cluster_name }}-access-instructions.txt"
    mode: '0600'
    content: |
      OpenShift Cluster Access Instructions
      =====================================

      Cluster: {{ cluster_name }}.{{ base_domain }}
      Topology: {{ cluster_topology }}
      Installation Date: {{ ansible_date_time.iso8601 }}

      API Endpoint:
        https://api.{{ cluster_name }}.{{ base_domain }}:6443

      Web Console:
        https://console-openshift-console.apps.{{ cluster_name }}.{{ base_domain }}

      Credentials:
        Username: kubeadmin
        Password: {{ kubeadmin_password }}

      CLI Access:
        export KUBECONFIG={{ credentials_export_dir | default('/data/ocp-credentials') }}/{{ cluster_name }}-kubeconfig
        oc whoami
        oc get nodes
        oc get co

      Web Console Login:
        1. Open: https://console-openshift-console.apps.{{ cluster_name }}.{{ base_domain }}
        2. Username: kubeadmin
        3. Password: (see above)

      Create Additional Users:
        oc create -f htpasswd-secret.yaml
        oc patch oauth cluster --type=merge -p '{"spec":{"identityProviders":[...]}}'

      Delete kubeadmin (after creating admin users):
        oc delete secret kubeadmin -n kube-system

      Files:
        Kubeconfig: {{ credentials_export_dir | default('/data/ocp-credentials') }}/{{ cluster_name }}-kubeconfig
        Password: {{ credentials_export_dir | default('/data/ocp-credentials') }}/{{ cluster_name }}-kubeadmin-password
        Instructions: {{ credentials_export_dir | default('/data/ocp-credentials') }}/{{ cluster_name }}-access-instructions.txt
  delegate_to: localhost

- name: Display exported credentials
  ansible.builtin.debug:
    msg:
      - "✅ Credentials exported successfully"
      - ""
      - "Cluster Access:"
      - "  API: https://api.{{ cluster_name }}.{{ base_domain }}:6443"
      - "  Console: https://console-openshift-console.apps.{{ cluster_name }}.{{ base_domain }}"
      - ""
      - "Credentials Location:"
      - "  {{ credentials_export_dir | default('/data/ocp-credentials') }}/{{ cluster_name }}-kubeconfig"
      - "  {{ credentials_export_dir | default('/data/ocp-credentials') }}/{{ cluster_name }}-kubeadmin-password"
      - "  {{ credentials_export_dir | default('/data/ocp-credentials') }}/{{ cluster_name }}-access-instructions.txt"
      - ""
      - "Quick Start:"
      - "  export KUBECONFIG={{ credentials_export_dir | default('/data/ocp-credentials') }}/{{ cluster_name }}-kubeconfig"
      - "  oc whoami"
      - "  oc get nodes"

- name: Set file permissions on exported credentials
  ansible.builtin.file:
    path: "{{ item }}"
    mode: '0600'
  loop:
    - "{{ credentials_export_dir | default('/data/ocp-credentials') }}/{{ cluster_name }}-kubeconfig"
    - "{{ credentials_export_dir | default('/data/ocp-credentials') }}/{{ cluster_name }}-kubeadmin-password"
    - "{{ credentials_export_dir | default('/data/ocp-credentials') }}/{{ cluster_name }}-access-instructions.txt"
  delegate_to: localhost
