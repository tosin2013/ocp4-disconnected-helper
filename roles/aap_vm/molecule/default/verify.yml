---
# Verify playbook for aap_vm orchestration testing

- name: Verify - AAP VM Orchestration
  hosts: localhost
  gather_facts: false
  vars:
    test_dir: "/tmp/molecule-test-aap-vm"
  tasks:
    # Assertion 1: All 9 phases executed
    - name: Check all phase flags
      ansible.builtin.find:
        paths: "{{ test_dir }}"
        patterns: "phase*"
      register: phase_flags

    - name: Assert all 9 phases executed
      ansible.builtin.assert:
        that:
          - phase_flags.matched == 9
          - "'phase1-vm-provisioned' in phase_flags.files | map(attribute='path') | map('basename') | list"
          - "'phase2-vm-ready' in phase_flags.files | map(attribute='path') | map('basename') | list"
          - "'phase3-prerequisites' in phase_flags.files | map(attribute='path') | map('basename') | list"
          - "'phase4-installer-downloaded' in phase_flags.files | map(attribute='path') | map('basename') | list"
          - "'phase5-aap-configured' in phase_flags.files | map(attribute='path') | map('basename') | list"
          - "'phase6-aap-installed' in phase_flags.files | map(attribute='path') | map('basename') | list"
          - "'phase7-post-install' in phase_flags.files | map(attribute='path') | map('basename') | list"
          - "'phase8-playbooks-imported' in phase_flags.files | map(attribute='path') | map('basename') | list"
          - "'phase9-verified' in phase_flags.files | map(attribute='path') | map('basename') | list"
        fail_msg: "Not all phases executed ({{ phase_flags.matched }}/9)"
        success_msg: "✓ All 9 AAP deployment phases executed"

    # Assertion 2: Orchestration summary created
    - name: Check orchestration summary
      ansible.builtin.stat:
        path: "{{ test_dir }}/aap-orchestration-summary.txt"
      register: summary_stat

    - name: Assert orchestration summary created
      ansible.builtin.assert:
        that:
          - summary_stat.stat.exists
        fail_msg: "Orchestration summary not created"
        success_msg: "✓ Orchestration summary created"

    # Summary
    - name: Test Summary
      ansible.builtin.debug:
        msg: |
          ============================================
          AAP VM Orchestration Tests: PASSED
          ============================================
          ✓ Phase 1: VM provisioning delegation
          ✓ Phase 2: Wait for VM accessibility
          ✓ Phase 3: Prerequisites installation
          ✓ Phase 4: AAP installer download
          ✓ Phase 5: AAP configuration
          ✓ Phase 6: AAP installation
          ✓ Phase 7: Post-installation setup
          ✓ Phase 8: Playbook import (conditional)
          ✓ Phase 9: Verification

          Coverage:
          - tasks/main.yml: Lines 1-116 (full orchestration)
          - 9-phase deployment workflow
          - Phase conditionals (vm_state, aap_import_playbooks)
          - Delegation patterns (localhost vs SSH)
          - VM state transitions (present vs absent)

          Total Assertions: 2
