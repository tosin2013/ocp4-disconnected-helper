---
# Molecule scenario for testing common_vm role with static IP configuration
#
# Tests:
# - Cloud-init network-config v2 generation with static IP
# - gateway4 vs routes configuration (ADR workaround)
# - DNS servers JSON formatting
# - Network configuration validation

dependency:
  name: galaxy
  enabled: false

ansible:
  cfg:
    defaults:
      host_key_checking: false
      verbosity: 1
      callbacks_enabled: profile_tasks
  env:
    ANSIBLE_FORCE_COLOR: "1"

  playbooks:
    create: ../default/create.yml
    converge: converge.yml
    destroy: ../default/destroy.yml
    verify: verify.yml

platforms:
  - name: static-ip-test
    image: registry.access.redhat.com/ubi9/ubi-init:latest
    pre_build_image: true
    command: /usr/sbin/init
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    tmpfs:
      /run: ""
      /tmp: ""

provisioner:
  name: ansible
  log: true
  options:
    diff: true
  inventory:
    host_vars:
      static-ip-test:
        # Static IP configuration
        vm_name: "test-static-vm"
        vm_use_static_ip: true
        vm_static_ip: "192.168.10.50"
        vm_netmask: "255.255.255.0"
        vm_gateway: "192.168.10.1"
        vm_dns_servers:
          - "192.168.10.1"
          - "8.8.8.8"
        vm_network: "management"
        vm_network_bridge: "virbr1"

        # VM specs
        vm_memory: 2048
        vm_cpus: 2
        vm_disk_size: 20

        # Cloud-init
        vm_hostname: "test-static-vm"
        vm_fqdn: "test-static-vm.example.com"
        vm_user: "admin"
        vm_ssh_public_key: "ssh-rsa AAAAB3NzaC1yc2EAAAADAQABAAABAQ test@example.com"

verifier:
  name: ansible

scenario:
  name: static-ip
  test_sequence:
    - destroy
    - create
    - converge
    - verify
    - destroy
