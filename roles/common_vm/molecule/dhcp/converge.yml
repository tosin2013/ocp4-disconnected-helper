---
# Converge playbook for DHCP scenario
# Tests cloud-init configuration generation with DHCP enabled

- name: Converge - DHCP Configuration
  hosts: localhost
  gather_facts: false
  vars:
    vm_images_dir: "/tmp/molecule-test-dhcp"
    vm_cloud_init_iso: "/tmp/molecule-test-dhcp/test-dhcp-vm-cloud-init.iso"
  tasks:
    - name: Create mock image directory
      ansible.builtin.file:
        path: "{{ vm_images_dir }}"
        state: directory
        mode: '0755'

    - name: Generate cloud-init user-data
      ansible.builtin.template:
        src: "../../templates/cloud-init/user-data.yml.j2"
        dest: "/tmp/molecule-test-dhcp/user-data"
        mode: '0644'
      vars:
        vm_name: "test-dhcp-vm"
        vm_hostname: "test-dhcp-vm"
        vm_fqdn: "test-dhcp-vm.example.com"
        vm_user: "admin"
        vm_ssh_public_key: "ssh-rsa AAAAB3NzaC1yc2EAAAADAQABAAABAQ test@example.com"

    - name: Generate cloud-init network-config v2 (DHCP)
      ansible.builtin.template:
        src: "../../templates/cloud-init/network-config.yml.j2"
        dest: "/tmp/molecule-test-dhcp/network-config"
        mode: '0644'
      vars:
        vm_use_static_ip: false

    - name: Display generated network-config
      ansible.builtin.command:
        cmd: cat /tmp/molecule-test-dhcp/network-config
      register: network_config_content
      changed_when: false

    - name: Show network-config content
      ansible.builtin.debug:
        var: network_config_content.stdout_lines
