---
# Molecule scenario for testing libvirt XML template generation
#
# Tests:
# - VM domain XML syntax validation
# - Required elements (memory, vcpu, disk, network)
# - Boot ISO conditional (vm_boot_iso vs vm_cloud_init_iso)
# - CPU/memory/disk configuration
# - Network interface configuration
# - Serial console and graphics setup

dependency:
  name: galaxy
  enabled: false

ansible:
  cfg:
    defaults:
      host_key_checking: false
      verbosity: 1
      callbacks_enabled: profile_tasks
  env:
    ANSIBLE_FORCE_COLOR: "1"

  playbooks:
    create: ../default/create.yml
    converge: converge.yml
    destroy: ../default/destroy.yml
    verify: verify.yml

platforms:
  - name: libvirt-xml-test
    image: registry.access.redhat.com/ubi9/ubi-init:latest
    pre_build_image: true
    command: /usr/sbin/init
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    tmpfs:
      /run: ""
      /tmp: ""

provisioner:
  name: ansible
  log: true
  options:
    diff: true
  inventory:
    host_vars:
      libvirt-xml-test:
        # Standard VM configuration
        vm_name: "test-libvirt-vm"
        vm_memory: 4096
        vm_cpus: 4
        vm_disk_size: 50

        # Network
        vm_mac_address: "52:54:00:ab:cd:ef"
        vm_network: "default"
        vm_network_bridge: "virbr0"

        # Paths
        vm_images_dir: "/var/lib/libvirt/images"
        vm_disk_path_full: "/var/lib/libvirt/images/test-libvirt-vm.qcow2"
        vm_cloud_init_iso: "/var/lib/libvirt/images/test-libvirt-vm-cloud-init.iso"

        # Test both cloud-init and custom boot ISO modes
        vm_boot_iso: ""  # Empty for cloud-init mode

verifier:
  name: ansible

scenario:
  name: libvirt-xml
  test_sequence:
    - destroy
    - create
    - converge
    - verify
    - destroy
