---
# Molecule scenario for testing MAC address generation logic
#
# Tests:
# - Deterministic MAC address from vm_name
# - MAC address uniqueness across multiple VMs
# - MAC address override with vm_mac_address variable
# - MAC address format validation (52:54:00:xx:xx:xx)

dependency:
  name: galaxy
  enabled: false

ansible:
  cfg:
    defaults:
      host_key_checking: false
      verbosity: 1
      callbacks_enabled: profile_tasks
  env:
    ANSIBLE_FORCE_COLOR: "1"

  playbooks:
    create: ../default/create.yml
    converge: converge.yml
    destroy: ../default/destroy.yml
    verify: verify.yml

platforms:
  - name: mac-test
    image: registry.access.redhat.com/ubi9/ubi-init:latest
    pre_build_image: true
    command: /usr/sbin/init
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    tmpfs:
      /run: ""
      /tmp: ""

provisioner:
  name: ansible
  log: true
  options:
    diff: true

verifier:
  name: ansible

scenario:
  name: mac-address
  test_sequence:
    - destroy
    - create
    - converge
    - verify
    - destroy
