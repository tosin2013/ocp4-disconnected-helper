---
# Molecule scenario for testing role idempotence
#
# Tests:
# - First run creates resources
# - Second run makes zero changes (idempotent)
# - File creation uses 'creates:' parameter correctly
# - Conditional logic prevents duplicate work

dependency:
  name: galaxy
  enabled: false

ansible:
  cfg:
    defaults:
      host_key_checking: false
      verbosity: 1
      callbacks_enabled: profile_tasks
  env:
    ANSIBLE_FORCE_COLOR: "1"

  playbooks:
    create: ../default/create.yml
    converge: converge.yml
    destroy: ../default/destroy.yml
    verify: verify.yml

platforms:
  - name: idempotence-test
    image: registry.access.redhat.com/ubi9/ubi-init:latest
    pre_build_image: true
    command: /usr/sbin/init
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    tmpfs:
      /run: ""
      /tmp: ""

provisioner:
  name: ansible
  log: true
  options:
    diff: true

verifier:
  name: ansible

scenario:
  name: idempotence
  test_sequence:
    - destroy
    - create
    - converge
    - converge  # Run twice to test idempotence
    - verify
    - destroy
