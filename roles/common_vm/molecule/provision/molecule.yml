---
# Molecule scenario for testing VM provisioning logic
#
# Tests:
# - Base image download and disk creation
# - Cloud-init ISO generation
# - VM XML definition and libvirt creation
# - Boot timeout and autostart configuration
# - Force recreate logic

dependency:
  name: galaxy
  enabled: false

ansible:
  cfg:
    defaults:
      host_key_checking: false
      verbosity: 1
      callbacks_enabled: profile_tasks
  env:
    ANSIBLE_FORCE_COLOR: "1"

  playbooks:
    create: ../default/create.yml
    converge: converge.yml
    destroy: ../default/destroy.yml
    verify: verify.yml

platforms:
  - name: provision-test
    image: registry.access.redhat.com/ubi9/ubi-init:latest
    pre_build_image: true
    command: /usr/sbin/init
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    tmpfs:
      /run: ""
      /tmp: ""

provisioner:
  name: ansible
  log: true
  options:
    diff: true

verifier:
  name: ansible

scenario:
  name: provision
  test_sequence:
    - destroy
    - create
    - converge
    - verify
    - destroy
