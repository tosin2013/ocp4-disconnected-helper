---
# Verify playbook for task orchestration testing
# Validates conditional task execution based on vm_state and network configuration

- name: Verify - Task Orchestration
  hosts: localhost
  gather_facts: false
  vars:
    test_dir: "/tmp/molecule-test-orchestration"
  tasks:
    # Test 1: Deletion flow
    - name: Read deletion test result
      ansible.builtin.slurp:
        src: "{{ test_dir }}/test1-deletion.txt"
      register: test1_b64

    - name: Assert delete tasks executed when vm_state=absent
      ansible.builtin.assert:
        that:
          - "'Delete tasks executed: True' in (test1_b64.content | b64decode)"
        fail_msg: "Delete tasks not executed for vm_state=absent"
        success_msg: "✓ Delete tasks executed for vm_state=absent"

    # Test 2: Static IP full workflow
    - name: Read static IP test result
      ansible.builtin.slurp:
        src: "{{ test_dir }}/test2-static-ip.txt"
      register: test2_b64

    - name: Assert static IP workflow executed all tasks
      ansible.builtin.assert:
        that:
          - "'setup_static_dhcp executed: True' in (test2_b64.content | b64decode)"
          - "'provision executed: True' in (test2_b64.content | b64decode)"
          - "'configure_static_ip executed: True' in (test2_b64.content | b64decode)"
          - "'Total flags: 4' in (test2_b64.content | b64decode)"
        fail_msg: "Static IP workflow incomplete"
        success_msg: "✓ Static IP workflow complete (setup + provision + configure)"

    # Test 3: DHCP workflow (provision only)
    - name: Read DHCP test result
      ansible.builtin.slurp:
        src: "{{ test_dir }}/test3-dhcp.txt"
      register: test3_b64

    - name: Assert DHCP workflow skipped static IP tasks
      ansible.builtin.assert:
        that:
          - "'setup_static_dhcp skipped: True' in (test3_b64.content | b64decode)"
          - "'provision executed: True' in (test3_b64.content | b64decode)"
          - "'configure_static_ip skipped: True' in (test3_b64.content | b64decode)"
          - "'Total flags: 2' in (test3_b64.content | b64decode)"
        fail_msg: "DHCP workflow executed incorrect tasks"
        success_msg: "✓ DHCP workflow correct (provision only, skipped static IP tasks)"

    # Test 4: VyOS-managed network
    - name: Read VyOS test result
      ansible.builtin.slurp:
        src: "{{ test_dir }}/test4-vyos.txt"
      register: test4_b64

    - name: Assert VyOS workflow skipped dnsmasq tasks
      ansible.builtin.assert:
        that:
          - "'setup_static_dhcp skipped: True' in (test4_b64.content | b64decode)"
          - "'provision executed: True' in (test4_b64.content | b64decode)"
          - "'configure_static_ip skipped: True' in (test4_b64.content | b64decode)"
          - "'Total flags: 2' in (test4_b64.content | b64decode)"
        fail_msg: "VyOS workflow executed incorrect tasks"
        success_msg: "✓ VyOS workflow correct (provision only, skipped dnsmasq tasks)"

    # Test 5: Verify orchestration summary
    - name: Check orchestration summary exists
      ansible.builtin.stat:
        path: "{{ test_dir }}/orchestration-summary.txt"
      register: summary_stat

    - name: Assert orchestration summary created
      ansible.builtin.assert:
        that:
          - summary_stat.stat.exists
        fail_msg: "Orchestration summary not created"
        success_msg: "✓ Orchestration summary created"

    # Summary
    - name: Test Summary
      ansible.builtin.debug:
        msg: |
          ============================================
          Task Orchestration Tests: PASSED
          ============================================
          ✓ vm_state=absent → Delete flow executed
          ✓ vm_state=present + static IP → Full workflow (4 tasks)
          ✓ vm_state=present + DHCP → Provision only (2 tasks)
          ✓ VyOS-managed network → Provision only (2 tasks)
          ✓ Orchestration summary generated

          Coverage:
          - tasks/main.yml: Lines 4-37 (full orchestration logic)
          - Conditional task inclusion (import_tasks when clauses)
          - vm_state transitions (absent vs present)
          - Network mode detection (static IP vs DHCP vs VyOS)
          - vyos_managed_network flag handling

          Validated Conditional Logic:
          - Delete: when vm_state == 'absent'
          - Setup static DHCP: when vm_state == 'present' AND vm_use_static_ip AND vm_static_ip != '' AND NOT vyos_managed
          - Provision: when vm_state == 'present'
          - Configure static IP: when vm_state == 'present' AND vm_use_static_ip AND vm_static_ip != '' AND NOT vyos_managed
          - Wait for SSH: when vm_state == 'present' AND vm_use_static_ip

          Edge Cases Tested:
          - Empty vm_static_ip (DHCP fallback)
          - vyos_managed_network=true (skip dnsmasq tasks)
          - Multiple state transitions in single playbook run
