---
# Molecule scenario for testing error handling in common_vm role
#
# Tests:
# - Missing required variables (vm_name, vm_memory, vm_cpus)
# - Invalid network configuration (both static and DHCP enabled)
# - Static IP without vm_static_ip value
# - Graceful failure messages

dependency:
  name: galaxy
  enabled: false

ansible:
  cfg:
    defaults:
      host_key_checking: false
      verbosity: 1
      callbacks_enabled: profile_tasks
  env:
    ANSIBLE_FORCE_COLOR: "1"

  playbooks:
    create: ../default/create.yml
    converge: converge.yml
    destroy: ../default/destroy.yml
    verify: verify.yml

platforms:
  - name: error-test
    image: registry.access.redhat.com/ubi9/ubi-init:latest
    pre_build_image: true
    command: /usr/sbin/init
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    tmpfs:
      /run: ""
      /tmp: ""

provisioner:
  name: ansible
  log: true
  options:
    diff: true

verifier:
  name: ansible

scenario:
  name: error-handling
  test_sequence:
    - destroy
    - create
    - converge
    - verify
    - destroy
