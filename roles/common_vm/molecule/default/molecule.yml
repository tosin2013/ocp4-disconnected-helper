---
# Molecule configuration for common_vm role testing with Podman
#
# TECHNICAL DEBT (ADR-0036): Uses rootful Podman (sudo) for container operations
# due to fundamental incompatibility between rootless Podman 5.8.2 and CentOS
# Stream 10's UID mapping implementation. The newuidmap binary rejects Podman's
# default mapping (container UID 0 → host UID 1001) at the kernel level.
#
# This is acceptable for test isolation since:
# - Tests run in ephemeral CI environment with trusted images
# - Production deployments still use rootless where supported
# - Alternative solutions (userns modes) fail during image pull phase
#
# See ADR-0036 for complete technical analysis and future migration path.

dependency:
  name: galaxy
  enabled: false  # No external dependencies for this role

ansible:
  cfg:
    defaults:
      host_key_checking: false
      verbosity: 1
      callbacks_enabled: profile_tasks
  env:
    ANSIBLE_FORCE_COLOR: "1"

  playbooks:
    create: create.yml
    converge: converge.yml
    destroy: destroy.yml
    verify: verify.yml

platforms:
  - name: instance
    image: registry.access.redhat.com/ubi9/ubi-init:latest
    pre_build_image: true
    command: /usr/sbin/init
    privileged: true  # Required for systemd in container
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    tmpfs:
      /run: ""
      /tmp: ""

provisioner:
  name: ansible
  log: true
  options:
    diff: true

verifier:
  name: ansible

scenario:
  name: default
  test_sequence:
    - destroy
    - create
    - converge
    - verify
    - destroy
