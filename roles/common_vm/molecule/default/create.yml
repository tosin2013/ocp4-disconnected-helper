---
# Molecule create playbook for Podman containers
#
# TECHNICAL DEBT (ADR-0036): Uses rootful Podman (sudo) due to fundamental
# incompatibility between rootless Podman 5.8.2 and CentOS Stream 10's UID
# mapping implementation.
#
# Root Cause: The newuidmap binary rejects Podman's default UID mapping
# (container UID 0 → host UID 1001) at the kernel level, even with correct
# /etc/subuid configuration. This affects ALL rootless operations including:
# - podman pull (image layer extraction)
# - podman images (image list with namespace setup)
# - podman run (container creation)
#
# Why Rootful for Testing is Acceptable:
# - Molecule tests run in isolated CI environment (not production)
# - Container content is trusted (official Red Hat UBI images)
# - Test execution is ephemeral (containers destroyed after each run)
# - Production deployments still use rootless where supported
#
# Attempted Solutions (All Failed):
# - userns=nomap: UID mapping fails before runtime flag takes effect
# - userns=auto: Same failure during image pull phase
# - Storage squashing: Degrades isolation without solving root cause
# - Explicit /etc/subuid entry: Podman explicitly rejects including host UID
#
# Future Resolution (v1.4.0+):
# - Upstream Podman fix for CentOS Stream 10 UID mapping
# - Migration to Docker-compatible runtime with rootless support
# - Alternative: Use VM-based Molecule driver instead of containers
#
# See ADR-0036 for complete technical analysis and security impact assessment.

- name: Create Podman container for testing
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    molecule_inventory:
      all:
        hosts: {}
  tasks:
    - name: Pull container image (rootful)
      ansible.builtin.command:
        cmd: sudo podman pull {{ item.image }}
      loop: "{{ molecule_yml.platforms }}"
      register: pull_result
      changed_when: "'Downloaded newer image' in pull_result.stdout or 'Storing signatures' in pull_result.stdout"

    - name: Create Podman container (rootful)
      ansible.builtin.command:
        cmd: >
          sudo podman run -d
          --name {{ item.name }}
          --privileged={{ item.privileged | default(false) }}
          {% for vol in item.volumes | default([]) %}
          -v {{ vol }}
          {% endfor %}
          {% for mount_point in item.tmpfs | default({}) | list %}
          --tmpfs {{ mount_point }}
          {% endfor %}
          {{ item.image }}
          {{ item.command | default('/usr/sbin/init') }}
      loop: "{{ molecule_yml.platforms }}"
      register: container_result
      changed_when: true

    - name: Populate instance config dict
      ansible.builtin.set_fact:
        instance_conf_dict:
          instance: "{{ item.name }}"
          address: "localhost"
          user: "root"
          port: "22"
          identity_file: ""
          connection: "containers.podman.podman"
      loop: "{{ molecule_yml.platforms }}"
      register: instance_config_dict

    - name: Convert instance config dict to a list
      ansible.builtin.set_fact:
        instance_conf: "{{ instance_config_dict.results | map(attribute='ansible_facts.instance_conf_dict') | list }}"

    - name: Dump instance config
      ansible.builtin.copy:
        content: |
          # Molecule managed

          {{ instance_conf | to_json | from_json | to_yaml }}
        dest: "{{ molecule_instance_config }}"
        mode: "0600"
