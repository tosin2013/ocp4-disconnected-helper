---
# Verify playbook for certificate setup testing

- name: Verify - Certificate Setup
  hosts: localhost
  gather_facts: false
  vars:
    test_dir: "/tmp/molecule-test-certificates"
    mirror_registry_install_dir: "{{ test_dir }}/opt/mirror-registry"
  tasks:
    # Assertion 1: Certificate files created
    - name: Check certificate files exist
      ansible.builtin.stat:
        path: "{{ item }}"
      register: cert_files
      loop:
        - "{{ mirror_registry_install_dir }}/ssl.cert"
        - "{{ mirror_registry_install_dir }}/ssl.key"

    - name: Assert certificate files created
      ansible.builtin.assert:
        that:
          - cert_files.results[0].stat.exists
          - cert_files.results[1].stat.exists
        fail_msg: "Certificate files not created"
        success_msg: "✓ Certificate files created"

    # Assertion 2: Key has secure permissions
    - name: Assert key permissions are secure
      ansible.builtin.assert:
        that:
          - cert_files.results[1].stat.mode == '0600'
        fail_msg: "Private key permissions not secure ({{ cert_files.results[1].stat.mode }})"
        success_msg: "✓ Private key permissions secure (0600)"

    # Assertion 3: Certificate is valid X.509
    - name: Validate certificate format
      ansible.builtin.command:
        cmd: "openssl x509 -in {{ mirror_registry_install_dir }}/ssl.cert -noout -subject"
      register: cert_validation
      changed_when: false
      failed_when: cert_validation.rc != 0

    - name: Assert certificate is valid X.509
      ansible.builtin.assert:
        that:
          - cert_validation.rc == 0
          - "'CN=registry.test.local' in cert_validation.stdout"
        fail_msg: "Certificate validation failed"
        success_msg: "✓ Certificate is valid X.509 with correct CN"

    # Assertion 4: Test result files created
    - name: Check test result files
      ansible.builtin.stat:
        path: "{{ item }}"
      register: result_files
      loop:
        - "{{ test_dir }}/self-signed-result.txt"
        - "{{ test_dir }}/aws-detection-result.txt"
        - "{{ test_dir }}/validation-result.txt"
        - "{{ test_dir }}/assertion-result.txt"

    - name: Assert all test results captured
      ansible.builtin.assert:
        that:
          - result_files.results | selectattr('stat.exists') | list | length == 4
        fail_msg: "Not all test results captured"
        success_msg: "✓ All test results captured (4/4)"

    # Summary
    - name: Test Summary
      ansible.builtin.debug:
        msg: |
          ============================================
          Certificate Setup Tests: PASSED
          ============================================
          ✓ Self-signed certificate generation
          ✓ Private key permissions (0600)
          ✓ Certificate X.509 validation
          ✓ AWS credentials detection logic
          ✓ Certificate provider validation
          ✓ Certificate facts assertion

          Coverage:
          - tasks/setup_certificates.yml: Lines 1-204 (full file)
          - Certificate strategy detection (Let's Encrypt vs self-signed)
          - AWS credentials detection logic
          - Preflight validation rules
          - OpenSSL certificate generation
          - File permissions enforcement
          - Certificate facts setup

          Total Assertions: 4
