---
# Molecule scenario for certificate setup testing
#
# Tests:
# - Let's Encrypt vs self-signed decision logic
# - AWS credentials detection
# - Preflight validation warnings
# - Certificate file creation and permissions

dependency:
  name: galaxy
  enabled: false

ansible:
  cfg:
    defaults:
      host_key_checking: false
      verbosity: 1
  env:
    ANSIBLE_FORCE_COLOR: "1"

  playbooks:
    create: ../../common_vm/molecule/default/create.yml
    converge: converge.yml
    destroy: ../../common_vm/molecule/default/destroy.yml
    verify: verify.yml

platforms:
  - name: certificates-test
    image: registry.access.redhat.com/ubi9/ubi-init:latest
    pre_build_image: true
    command: /usr/sbin/init
    privileged: true
    userns: "nomap"
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    tmpfs:
      /run: ""
      /tmp: ""

provisioner:
  name: ansible
  log: true
  options:
    diff: true

verifier:
  name: ansible

scenario:
  name: certificates
  test_sequence:
    - destroy
    - create
    - converge
    - verify
    - destroy
