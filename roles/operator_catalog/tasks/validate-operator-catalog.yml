---
# Validate individual operator catalog
# Included task file for per-catalog validation

- name: Extract catalog name from URL
  ansible.builtin.set_fact:
    catalog_name: "{{ operator_catalog.catalog | regex_search('([^/]+):v[0-9.]+$') | regex_replace(':v[0-9.]+$', '') }}"
    catalog_version: "{{ operator_catalog.catalog | regex_search('v([0-9.]+)$', '\\1') | first }}"

- name: Build cache file path
  ansible.builtin.set_fact:
    cache_file_key: "{{ catalog_name }}-v{{ catalog_version }}"

- name: Check if catalog cache exists
  ansible.builtin.debug:
    msg: "Validating against cache: {{ cache_file_key }}"

- name: Load catalog data from cache
  ansible.builtin.set_fact:
    cached_operators: "{{ catalog_cache[cache_file_key] | default({}) }}"

- name: Validate each package in catalog
  ansible.builtin.include_tasks: validate-single-operator.yml
  loop: "{{ operator_catalog.packages }}"
  loop_control:
    loop_var: operator_package
    label: "{{ operator_package.name }}"
  when: operator_catalog.packages is defined and operator_catalog.packages | length > 0
