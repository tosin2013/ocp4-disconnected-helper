name: Build and Push Custom AAP Execution Environment

on:
  push:
    branches:
      - main
    paths:
      - 'ocp4-aap-execution-environment/**'
      - '.github/workflows/build-custom-ee.yml'
  workflow_dispatch:

env:
  # CRITICAL: Required for podman rootless containers
  XDG_RUNTIME_DIR: /run/user/${{ github.actor_id || 1001 }}
  REGISTRY: quay.io
  IMAGE_NAME: takinosh/ocp4-aap-execution-environment
  IMAGE_TAG: latest

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true  # If ocp4-aap-execution-environment is a submodule

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ansible-builder
        run: |
          pip install ansible-builder

      - name: Set up Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Authenticate to registry.redhat.io
        env:
          REGISTRY_USERNAME: ${{ secrets.RH_REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.RH_REGISTRY_PASSWORD }}
        run: |
          echo "$REGISTRY_PASSWORD" | podman login registry.redhat.io --username "$REGISTRY_USERNAME" --password-stdin

      - name: Build custom execution environment
        working-directory: ./ocp4-aap-execution-environment
        env:
          REGISTRY_USERNAME: ${{ secrets.RH_REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.RH_REGISTRY_PASSWORD }}
        run: |
          ansible-builder build \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            --container-runtime podman \
            --build-arg REGISTRY_USERNAME="${REGISTRY_USERNAME}" \
            --build-arg REGISTRY_PASSWORD="${REGISTRY_PASSWORD}" \
            -v 3

      - name: Authenticate to Quay.io
        env:
          QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
          QUAY_PASSWORD: ${{ secrets.QUAY_PASSWORD }}
        run: |
          echo "$QUAY_PASSWORD" | podman login ${{ env.REGISTRY }} --username "$QUAY_USERNAME" --password-stdin

      - name: Push to Quay.io
        run: |
          podman push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Verify image in Quay
        run: |
          echo "✅ Image pushed successfully!"
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
