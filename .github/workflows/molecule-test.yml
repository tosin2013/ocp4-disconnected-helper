---
# GitHub Actions workflow for Molecule testing
# Runs on PR and push to main branch
# Tests all Molecule scenarios for Ansible roles

name: Molecule Tests

on:
  pull_request:
    branches: [main]
    paths:
      - 'roles/**'
      - '.github/workflows/molecule-test.yml'
  push:
    branches: [main]
    paths:
      - 'roles/**'
      - '.github/workflows/molecule-test.yml'
  workflow_dispatch:  # Allow manual trigger

jobs:
  detect-changed-roles:
    name: Detect Changed Roles
    runs-on: ubuntu-latest
    outputs:
      roles: ${{ steps.set-roles.outputs.roles }}
      any_changed: ${{ steps.set-roles.outputs.any_changed }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for git diff

      - name: Get changed roles
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: roles/**
          dir_names: true
          dir_names_max_depth: 2
          json: true

      - name: Set roles matrix
        id: set-roles
        run: |
          if [ "${{ steps.changed-files.outputs.any_changed }}" == "true" ]; then
            # Extract unique role names from changed paths
            CHANGED_ROLES=$(echo '${{ steps.changed-files.outputs.all_changed_files }}' | \
              jq -r '.[] | select(startswith("roles/")) | split("/")[1]' | \
              sort -u | jq -R -s -c 'split("\n") | map(select(length > 0))')

            echo "Changed roles: $CHANGED_ROLES"
            echo "roles=$CHANGED_ROLES" >> "$GITHUB_OUTPUT"
            echo "any_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No role changes detected"
            echo "roles=[]" >> "$GITHUB_OUTPUT"
            echo "any_changed=false" >> "$GITHUB_OUTPUT"
          fi

  molecule-test:
    name: Test ${{ matrix.role }} / ${{ matrix.scenario }}
    runs-on: ubuntu-latest
    needs: detect-changed-roles
    if: needs.detect-changed-roles.outputs.any_changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        role: ${{ fromJson(needs.detect-changed-roles.outputs.roles) }}
        scenario:
          # common_vm scenarios
          - default
          - static-ip
          - dhcp
          - error-handling
          - libvirt-xml
          - mac-address
          - idempotence
          - provision
          - deletion
          - orchestration
          # registry_vm scenarios
          - certificates
          # aap_vm scenarios (default shared with common_vm)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install molecule[podman] molecule-plugins[podman]
          pip install ansible-core

      - name: Install Ansible collections
        run: |
          ansible-galaxy collection install containers.podman
          ansible-galaxy collection install ansible.posix

      - name: Check if scenario exists
        id: scenario-check
        run: |
          if [ -d "roles/${{ matrix.role }}/molecule/${{ matrix.scenario }}" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Molecule test
        if: steps.scenario-check.outputs.exists == 'true'
        run: |
          cd roles/${{ matrix.role }}
          molecule test --scenario-name ${{ matrix.scenario }}
        env:
          ANSIBLE_FORCE_COLOR: '1'
          PY_COLORS: '1'

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: molecule-results-${{ matrix.role }}-${{ matrix.scenario }}
          path: |
            roles/${{ matrix.role }}/molecule/${{ matrix.scenario }}/.molecule/
            /tmp/molecule-test-*/
          retention-days: 7

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [detect-changed-roles, molecule-test]
    if: always()
    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.detect-changed-roles.outputs.any_changed }}" == "false" ]; then
            echo "✅ No role changes detected - tests skipped"
            exit 0
          fi

          if [ "${{ needs.molecule-test.result }}" == "success" ]; then
            echo "✅ All Molecule tests passed"
            exit 0
          else
            echo "❌ Molecule tests failed"
            exit 1
          fi
