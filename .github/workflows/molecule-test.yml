---
# GitHub Actions workflow for Molecule testing
# Runs on PR and push to main branch
# Tests all Molecule scenarios for Ansible roles

name: Molecule Tests

on:
  pull_request:
    branches: [main]
    paths:
      - 'roles/**'
      - '.github/workflows/molecule-test.yml'
  push:
    branches: [main]
    paths:
      - 'roles/**'
      - '.github/workflows/molecule-test.yml'
  workflow_dispatch:  # Allow manual trigger

jobs:
  detect-changed-roles:
    name: Detect Changed Roles
    runs-on: ubuntu-latest
    outputs:
      roles: ${{ steps.set-roles.outputs.roles }}
      any_changed: ${{ steps.set-roles.outputs.any_changed }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for git diff

      - name: Get changed roles
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: roles/**
          dir_names: true
          dir_names_max_depth: 2
          json: true

      - name: Set roles matrix
        id: set-roles
        run: |
          # On workflow_dispatch or push to main: test all roles
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] || [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "Testing all roles (workflow_dispatch or push to main)"
            ALL_ROLES='["common_vm","registry_vm","aap_vm"]'
            echo "roles=$ALL_ROLES" >> "$GITHUB_OUTPUT"
            echo "any_changed=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.changed-files.outputs.any_changed }}" == "true" ]; then
            # Extract unique role names from changed paths (PR workflow)
            CHANGED_ROLES=$(echo '${{ steps.changed-files.outputs.all_changed_files }}' | \
              jq -r '.[] | select(startswith("roles/")) | split("/")[1]' | \
              sort -u | jq -R -s -c 'split("\n") | map(select(length > 0))')

            echo "Changed roles: $CHANGED_ROLES"
            echo "roles=$CHANGED_ROLES" >> "$GITHUB_OUTPUT"
            echo "any_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No role changes detected"
            echo "roles=[]" >> "$GITHUB_OUTPUT"
            echo "any_changed=false" >> "$GITHUB_OUTPUT"
          fi

  molecule-test:
    name: Test ${{ matrix.role }} / ${{ matrix.scenario }}
    runs-on: ubuntu-latest
    needs: detect-changed-roles
    if: needs.detect-changed-roles.outputs.any_changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          # common_vm scenarios (10 total)
          - role: common_vm
            scenario: default
          - role: common_vm
            scenario: static-ip
          - role: common_vm
            scenario: dhcp
          - role: common_vm
            scenario: error-handling
          - role: common_vm
            scenario: libvirt-xml
          - role: common_vm
            scenario: mac-address
          - role: common_vm
            scenario: idempotence
          - role: common_vm
            scenario: provision
          - role: common_vm
            scenario: deletion
          - role: common_vm
            scenario: orchestration
          # registry_vm scenarios (3 total)
          - role: registry_vm
            scenario: default
          - role: registry_vm
            scenario: authentication
          - role: registry_vm
            scenario: certificates
          # aap_vm scenarios (1 total)
          - role: aap_vm
            scenario: default

    steps:
      - name: Check if role should be tested
        id: role-filter
        run: |
          ROLES='${{ needs.detect-changed-roles.outputs.roles }}'
          if echo "$ROLES" | jq -e '. | contains(["${{ matrix.role }}"])' > /dev/null; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "⏭️ Skipping ${{ matrix.role }} / ${{ matrix.scenario }} (role not changed)"
          fi

      - name: Checkout code
        if: steps.role-filter.outputs.should_run == 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.role-filter.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        if: steps.role-filter.outputs.should_run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install molecule[podman] molecule-plugins[podman]
          pip install ansible-core

      - name: Install Ansible collections
        if: steps.role-filter.outputs.should_run == 'true'
        run: |
          ansible-galaxy collection install containers.podman
          ansible-galaxy collection install ansible.posix

      - name: Run Molecule test
        if: steps.role-filter.outputs.should_run == 'true'
        run: |
          cd roles/${{ matrix.role }}
          molecule test --scenario-name ${{ matrix.scenario }}
        env:
          ANSIBLE_FORCE_COLOR: '1'
          PY_COLORS: '1'

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: molecule-results-${{ matrix.role }}-${{ matrix.scenario }}
          path: |
            roles/${{ matrix.role }}/molecule/${{ matrix.scenario }}/.molecule/
            /tmp/molecule-test-*/
          retention-days: 7

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [detect-changed-roles, molecule-test]
    if: always()
    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.detect-changed-roles.outputs.any_changed }}" == "false" ]; then
            echo "✅ No role changes detected - tests skipped"
            exit 0
          fi

          if [ "${{ needs.molecule-test.result }}" == "success" ]; then
            echo "✅ All Molecule tests passed"
            exit 0
          else
            echo "❌ Molecule tests failed"
            exit 1
          fi
