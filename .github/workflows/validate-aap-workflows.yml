---
# .github/workflows/validate-aap-workflows.yml
# AAP Workflow Validation Framework - CI/CD Integration
# ADR 0033: AAP Workflow Validation and Health Check Framework
# ADR 0008: GitHub Actions Automation
#
# Purpose: Automated validation of AAP workflows in CI/CD pipeline
# Triggers: Pull requests, push to main, manual dispatch
#
# Workflow:
#   1. Deploy ephemeral AAP instance (or use existing test environment)
#   2. Run Layer 1 health checks (shell scripts)
#   3. Run Layer 2 E2E workflow tests (Ansible playbooks)
#   4. Report results and block merge on failure

name: AAP Workflow Validation

on:
  pull_request:
    paths:
      - 'playbooks/aap-configuration/**'
      - 'playbooks/*-registry-*.yml'
      - 'playbooks/*-oc-mirror-*.yml'
      - 'playbooks/test-*-workflow.yml'
      - 'scripts/validate-aap-*.sh'
      - 'docs/adrs/0033-*.md'
      - '.github/workflows/validate-aap-workflows.yml'
  push:
    branches:
      - main
    paths:
      - 'playbooks/aap-configuration/**'
      - 'playbooks/test-*-workflow.yml'
      - 'scripts/validate-aap-*.sh'
  workflow_dispatch:
    inputs:
      test_environment:
        description: 'Test environment to use'
        required: false
        default: 'ephemeral'
        type: choice
        options:
          - ephemeral
          - staging
          - existing
      skip_deployment:
        description: 'Skip AAP deployment (use existing instance)'
        required: false
        default: false
        type: boolean
      dry_run:
        description: 'Dry run mode (no actual resource provisioning)'
        required: false
        default: false
        type: boolean

env:
  ANSIBLE_FORCE_COLOR: "true"
  ANSIBLE_HOST_KEY_CHECKING: "false"
  LIBVIRT_DEFAULT_URI: "qemu:///system"

jobs:
  # ==========================================================================
  # Job 1: Layer 1 Health Checks (Fast Validation)
  # ==========================================================================
  health-checks:
    name: Layer 1 - AAP Health Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq

      - name: Configure AAP credentials
        env:
          AAP_HOST: ${{ secrets.AAP_TEST_HOST || 'https://aap.sandbox3377.opentlc.com' }}
          AAP_GATEWAY_PASSWORD: ${{ secrets.AAP_GATEWAY_PASSWORD }}
          AAP_CONTROLLER_PASSWORD: ${{ secrets.AAP_CONTROLLER_PASSWORD }}
        run: |
          echo "AAP_HOST=$AAP_HOST" >> $GITHUB_ENV
          echo "AAP_GATEWAY_PASSWORD=$AAP_GATEWAY_PASSWORD" >> $GITHUB_ENV
          echo "AAP_CONTROLLER_PASSWORD=$AAP_CONTROLLER_PASSWORD" >> $GITHUB_ENV

      - name: Run AAP health validation
        id: health_check
        run: |
          chmod +x scripts/validate-aap-health.sh
          ./scripts/validate-aap-health.sh
        continue-on-error: true

      - name: Run workflow template validation
        id: workflow_check
        run: |
          chmod +x scripts/validate-aap-workflow-templates.sh
          ./scripts/validate-aap-workflow-templates.sh
        continue-on-error: true

      - name: Report health check results
        if: always()
        run: |
          echo "### Layer 1 Health Check Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.health_check.outcome }}" == "success" ]; then
            echo "✅ AAP health validation: **PASSED**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ AAP health validation: **FAILED**" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ steps.workflow_check.outcome }}" == "success" ]; then
            echo "✅ Workflow template validation: **PASSED**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Workflow template validation: **FAILED**" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Fail if health checks failed
        if: steps.health_check.outcome != 'success' || steps.workflow_check.outcome != 'success'
        run: |
          echo "::error::Layer 1 health checks failed"
          exit 1

  # ==========================================================================
  # Job 2: Layer 2 E2E Workflow Tests (Comprehensive Validation)
  # ==========================================================================
  e2e-workflow-tests:
    name: Layer 2 - E2E Workflow Tests
    runs-on: ubuntu-latest
    needs: health-checks
    timeout-minutes: 90
    if: github.event.inputs.skip_deployment != 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Ansible and collections
        run: |
          pip install ansible==9.5.1
          ansible-galaxy collection install ansible.controller:4.8.0
          ansible-galaxy collection install community.libvirt:2.2.0

      - name: Configure Ansible Vault password
        env:
          VAULT_PASSWORD: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}
        run: |
          echo "$VAULT_PASSWORD" > ~/.vault_pass
          chmod 600 ~/.vault_pass

      - name: Configure AAP credentials for Ansible
        env:
          AAP_CONTROLLER_PASSWORD: ${{ secrets.AAP_CONTROLLER_PASSWORD }}
        run: |
          # Create temporary secrets file (not committed)
          cat > extra_vars/ci-secrets.yml <<EOF
          admin_password: "$AAP_CONTROLLER_PASSWORD"
          automationgateway_admin_password: "${{ secrets.AAP_GATEWAY_PASSWORD }}"
          EOF

      - name: Test Registry VM Workflow (E2E)
        id: test_registry
        run: |
          ansible-playbook -i inventory/ibm-cloud.yml \
            playbooks/test-registry-vm-workflow.yml \
            -e@extra_vars/ci-secrets.yml \
            -e test_dry_run=${{ github.event.inputs.dry_run || 'false' }}
        continue-on-error: true

      - name: Test oc-mirror Workflow (E2E)
        id: test_oc_mirror
        run: |
          ansible-playbook -i inventory/ibm-cloud.yml \
            playbooks/test-oc-mirror-workflow.yml \
            -e@extra_vars/ci-secrets.yml \
            -e test_dry_run=${{ github.event.inputs.dry_run || 'false' }} \
            -e skip_phase2=true
        continue-on-error: true

      - name: Report E2E test results
        if: always()
        run: |
          echo "### Layer 2 E2E Workflow Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.test_registry.outcome }}" == "success" ]; then
            echo "✅ Registry VM workflow: **PASSED**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Registry VM workflow: **FAILED**" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ steps.test_oc_mirror.outcome }}" == "success" ]; then
            echo "✅ oc-mirror workflow: **PASSED**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ oc-mirror workflow: **FAILED**" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Clean up secrets
        if: always()
        run: |
          rm -f ~/.vault_pass
          rm -f extra_vars/ci-secrets.yml

      - name: Fail if E2E tests failed
        if: steps.test_registry.outcome != 'success' || steps.test_oc_mirror.outcome != 'success'
        run: |
          echo "::error::Layer 2 E2E workflow tests failed"
          exit 1

  # ==========================================================================
  # Job 3: Final Validation Summary
  # ==========================================================================
  validation-summary:
    name: Validation Summary
    runs-on: ubuntu-latest
    needs: [health-checks, e2e-workflow-tests]
    if: always()

    steps:
      - name: Generate final summary
        run: |
          echo "# AAP Workflow Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**ADR 0033 Compliance Check**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.health-checks.result }}" == "success" ]; then
            echo "✅ Layer 1 (Health Checks): **PASSED**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Layer 1 (Health Checks): **FAILED**" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.e2e-workflow-tests.result }}" == "success" ]; then
            echo "✅ Layer 2 (E2E Workflow Tests): **PASSED**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Layer 2 (E2E Workflow Tests): **FAILED**" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**ADR Compliance:**" >> $GITHUB_STEP_SUMMARY
          echo "- ADR 0033: AAP Workflow Validation Framework" >> $GITHUB_STEP_SUMMARY
          echo "- ADR 0032: Two-Workflow Pattern (deploy + teardown)" >> $GITHUB_STEP_SUMMARY
          echo "- ADR 0031: Control Plane EE Registry Authentication" >> $GITHUB_STEP_SUMMARY
          echo "- ADR 0028: Dual Password Architecture (Gateway + Controller)" >> $GITHUB_STEP_SUMMARY
          echo "- ADR 0008: GitHub Actions Automation" >> $GITHUB_STEP_SUMMARY

      - name: Check overall status
        if: needs.health-checks.result != 'success' || needs.e2e-workflow-tests.result != 'success'
        run: |
          echo "::error::AAP workflow validation failed - see summary for details"
          exit 1
