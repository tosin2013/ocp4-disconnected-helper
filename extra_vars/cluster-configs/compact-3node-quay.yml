---
# 3-Node Compact Cluster Configuration with Quay Mirror Registry (Primary)

# Cluster Identity
cluster_name: "ocp4-compact"
base_domain: "sandbox3377.opentlc.com"

# Topology: 3-Node Compact (3 control plane schedulable, 0 workers)
cluster_topology: "compact"
control_plane_replicas: 3
compute_replicas: 0

# OpenShift Version
ocp_version: "4.21"

# Registry Configuration (Quay - Primary)
registry_type: "quay"
registry_url: "registry.ocp4.sandbox3377.opentlc.com:8443"
registry_username: "init"
# registry_password: Set via vault or survey

# Network Configuration
cluster_network_cidr: "10.128.0.0/14"
cluster_network_host_prefix: 23
service_network_cidr: "172.30.0.0/16"
machine_network_cidr: "192.168.10.0/24"

# VIPs (separate from node IPs for HA)
api_vip: "192.168.10.20"
ingress_vip: "192.168.10.21"
rendezvous_ip: "192.168.10.30"  # First control plane node

# DNS Provider
dns_provider: "dnsmasq"

# VM Configuration (compact nodes)
provision_vms: true
vm_memory_mb: 24576  # 24GB per node (minimum for compact)
vm_vcpus: 6          # 6 vCPU per node
vm_disk_size_gb: 130
vm_network: "ocp-network"

# Node Network Configuration (static IP)
control_plane_nodes:
  - name: "master-0"
    ip: "192.168.10.30"
    mac: "52:54:00:10:30:01"
  - name: "master-1"
    ip: "192.168.10.31"
    mac: "52:54:00:10:30:02"
  - name: "master-2"
    ip: "192.168.10.32"
    mac: "52:54:00:10:30:03"

# Installation Settings
install_timeout_minutes: 120  # Longer for multi-node
validate_manifests: true

# Paths
pull_secret_path: "/root/pull-secret.json"
openshift_install_dir: "/root/openshift-install-compact-quay"
iso_output_path: "/data/iso/compact-quay"

# Compact-Specific Notes:
# - All 3 control plane nodes are schedulable (can run workloads)
# - No dedicated worker nodes required
# - Total resources: 18 vCPU, 72GB RAM
# - Suitable for small production clusters or lab environments
