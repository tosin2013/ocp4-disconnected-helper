---
# SNO Cluster Configuration with Quay Mirror Registry (Primary)

# Cluster Identity
cluster_name: "ocp4-sno"
base_domain: "sandbox3377.opentlc.com"

# Topology: Single-Node OpenShift
cluster_topology: "sno"
control_plane_replicas: 1
compute_replicas: 0

# OpenShift Version
ocp_version: "4.21"

# Registry Configuration (Quay - Primary)
registry_type: "quay"
registry_url: "registry.ocp4.sandbox3377.opentlc.com:8443"
registry_username: "init"
# registry_password: Set via vault or survey

# Network Configuration
cluster_network_cidr: "10.128.0.0/14"
cluster_network_host_prefix: 23
service_network_cidr: "172.30.0.0/16"
machine_network_cidr: "192.168.10.0/24"

# VIPs (SNO uses single IP, no separate VIPs)
api_vip: "192.168.10.10"
ingress_vip: "192.168.10.10"
rendezvous_ip: "192.168.10.10"

# DNS Provider
dns_provider: "dnsmasq"

# VM Configuration (SNO requirements)
provision_vms: true
vm_memory_mb: 32768  # 32GB minimum for SNO
vm_vcpus: 8          # 8 vCPU minimum
vm_disk_size_gb: 130
vm_network: "ocp-network"

# Installation Settings
install_timeout_minutes: 90
validate_manifests: true

# Paths
pull_secret_path: "/root/pull-secret.json"
openshift_install_dir: "/root/openshift-install-sno-quay"
iso_output_path: "/data/iso/sno-quay"
