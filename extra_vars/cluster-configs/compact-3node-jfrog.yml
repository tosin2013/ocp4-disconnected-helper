---
# 3-Node Compact Cluster Configuration with JFrog Artifactory (Community)

# Cluster Identity
cluster_name: "ocp4-compact-jfrog"
base_domain: "sandbox3377.opentlc.com"

# Topology: 3-Node Compact (3 control plane schedulable, 0 workers)
cluster_topology: "compact"
control_plane_replicas: 3
compute_replicas: 0

# OpenShift Version
ocp_version: "4.21"

# Registry Configuration (JFrog - Community)
registry_type: "jfrog"
registry_url: "jfrog.sandbox3377.opentlc.com"
registry_username: "admin"
# registry_password: Use JFrog access token, not password

# Network Configuration
cluster_network_cidr: "10.128.0.0/14"
cluster_network_host_prefix: 23
service_network_cidr: "172.30.0.0/16"
machine_network_cidr: "192.168.10.0/24"

# VIPs
api_vip: "192.168.10.24"
ingress_vip: "192.168.10.25"
rendezvous_ip: "192.168.10.36"

# DNS Provider
dns_provider: "dnsmasq"

# VM Configuration
provision_vms: true
vm_memory_mb: 24576
vm_vcpus: 6
vm_disk_size_gb: 130
vm_network: "ocp-network"

# Node Network Configuration
control_plane_nodes:
  - name: "master-0"
    ip: "192.168.10.36"
    mac: "52:54:00:10:36:01"
  - name: "master-1"
    ip: "192.168.10.37"
    mac: "52:54:00:10:36:02"
  - name: "master-2"
    ip: "192.168.10.38"
    mac: "52:54:00:10:36:03"

# Installation Settings
install_timeout_minutes: 120
validate_manifests: true

# Paths
pull_secret_path: "/root/pull-secret.json"
openshift_install_dir: "/root/openshift-install-compact-jfrog"
iso_output_path: "/data/iso/compact-jfrog"

# JFrog-Specific Notes:
# - Create docker repositories: ocp4-docker-local, redhat-docker-local
# - Generate access token: JFrog UI → User Profile → Generate Token
# - Use token as registry_password in pull secret
# - Enable Docker Registry API v2 in repository settings
