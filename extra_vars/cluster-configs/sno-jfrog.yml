---
# SNO Cluster Configuration with JFrog Artifactory (Community Contribution)

# Cluster Identity
cluster_name: "ocp4-sno-jfrog"
base_domain: "sandbox3377.opentlc.com"

# Topology: Single-Node OpenShift
cluster_topology: "sno"
control_plane_replicas: 1
compute_replicas: 0

# OpenShift Version
ocp_version: "4.21"

# Registry Configuration (JFrog - Community)
registry_type: "jfrog"
registry_url: "jfrog.sandbox3377.opentlc.com"  # JFrog uses subdomain routing
registry_username: "admin"
# registry_password: Use JFrog access token, not password

# Network Configuration
cluster_network_cidr: "10.128.0.0/14"
cluster_network_host_prefix: 23
service_network_cidr: "172.30.0.0/16"
machine_network_cidr: "192.168.10.0/24"

# VIPs (SNO uses single IP)
api_vip: "192.168.10.12"
ingress_vip: "192.168.10.12"
rendezvous_ip: "192.168.10.12"

# DNS Provider
dns_provider: "dnsmasq"

# VM Configuration
provision_vms: true
vm_memory_mb: 32768
vm_vcpus: 8
vm_disk_size_gb: 130
vm_network: "ocp-network"

# Installation Settings
install_timeout_minutes: 90
validate_manifests: true

# Paths
pull_secret_path: "/root/pull-secret.json"
openshift_install_dir: "/root/openshift-install-sno-jfrog"
iso_output_path: "/data/iso/sno-jfrog"

# JFrog-Specific Notes:
# - Create docker repositories: ocp4-docker-local, redhat-docker-local
# - Generate access token: JFrog UI → User Profile → Generate Token
# - Use token as registry_password in pull secret
# - Enable Docker Registry API v2 in repository settings
