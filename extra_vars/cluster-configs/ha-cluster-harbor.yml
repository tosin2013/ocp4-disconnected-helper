---
# HA Cluster Configuration with Harbor Mirror Registry (Community)

# Cluster Identity
cluster_name: "ocp4-ha-harbor"
base_domain: "sandbox3377.opentlc.com"

# Topology: HA (3 control plane + 3 workers)
cluster_topology: "ha"
control_plane_replicas: 3
compute_replicas: 3

# OpenShift Version
ocp_version: "4.21"

# Registry Configuration (Harbor - Community)
registry_type: "harbor"
registry_url: "harbor.sandbox3377.opentlc.com"
registry_username: "admin"
# registry_password: Set via vault or survey

# Network Configuration
cluster_network_cidr: "10.128.0.0/14"
cluster_network_host_prefix: 23
service_network_cidr: "172.30.0.0/16"
machine_network_cidr: "192.168.10.0/24"

# VIPs
api_vip: "192.168.10.42"
ingress_vip: "192.168.10.43"
rendezvous_ip: "192.168.10.53"

# DNS Provider
dns_provider: "dnsmasq"

# VM Configuration
provision_vms: true
vm_memory_mb_control: 24576
vm_vcpus_control: 6
vm_disk_size_gb_control: 130
vm_memory_mb_worker: 32768
vm_vcpus_worker: 12
vm_disk_size_gb_worker: 200
vm_network: "ocp-network"

# Control Plane Node Network Configuration
control_plane_nodes:
  - name: "master-0"
    ip: "192.168.10.53"
    mac: "52:54:00:10:53:01"
  - name: "master-1"
    ip: "192.168.10.54"
    mac: "52:54:00:10:53:02"
  - name: "master-2"
    ip: "192.168.10.55"
    mac: "52:54:00:10:53:03"

# Worker Node Network Configuration
worker_nodes:
  - name: "worker-0"
    ip: "192.168.10.63"
    mac: "52:54:00:10:63:01"
  - name: "worker-1"
    ip: "192.168.10.64"
    mac: "52:54:00:10:63:02"
  - name: "worker-2"
    ip: "192.168.10.65"
    mac: "52:54:00:10:63:03"

# Installation Settings
install_timeout_minutes: 150
validate_manifests: true

# Paths
pull_secret_path: "/root/pull-secret.json"
openshift_install_dir: "/root/openshift-install-ha-harbor"
iso_output_path: "/data/iso/ha-harbor"

# Harbor-Specific Notes:
# - Ensure ocp4-project and redhat-project exist in Harbor
# - Robot account needs read access to both projects
# - Harbor uses HTTPS on port 443 by default (no :8443)
