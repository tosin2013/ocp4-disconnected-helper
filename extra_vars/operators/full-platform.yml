---
# Full Platform Preset - Comprehensive OpenShift Capabilities
# Combines: Storage + Observability + Security + Networking
# Use Case: Complete enterprise platform with all foundational operators

# =========================================================================
# OpenShift Releases (Required)
# =========================================================================
openshift_releases:
  - name: stable-4.21
    minVersion: 4.21.0
    maxVersion: 4.21.0
    shortestPath: true

architectures:
  - amd64

enable_graph: true

# =========================================================================
# Operators - Full Platform Bundle
# =========================================================================
operators:
  # Red Hat Operator Catalog
  - catalog: registry.redhat.io/redhat/redhat-operator-index:v4.21
    packages:
      # ===== STORAGE (from storage-operators.yml) =====
      - name: local-storage-operator
        channels:
          - name: stable

      - name: odf-operator
        channels:
          - name: stable-4.21

      - name: lvms-operator
        channels:
          - name: stable-4.21

      - name: ocs-operator
        channels:
          - name: stable-4.21

      # ===== OBSERVABILITY (from observability-operators.yml) =====
      - name: cluster-logging
        channels:
          - name: stable-6.5

      - name: loki-operator
        channels:
          - name: stable-6.5

      - name: tempo-product
        channels:
          - name: stable

      - name: cluster-observability-operator
        channels:
          - name: development

      - name: openshift-gitops-operator
        channels:
          - name: latest

      # ===== SECURITY (from security-operators.yml) =====
      - name: compliance-operator
        channels:
          - name: stable

      - name: file-integrity-operator
        channels:
          - name: stable

      - name: quay-operator
        channels:
          - name: stable-3.14

      - name: quay-bridge-operator
        channels:
          - name: stable-3.14

      # ===== NETWORKING (from networking-operators.yml) =====
      - name: metallb-operator
        channels:
          - name: stable

      - name: kubernetes-nmstate-operator
        channels:
          - name: stable

      - name: submariner
        channels:
          - name: stable-0.24

      - name: servicemeshoperator
        channels:
          - name: stable

  # Certified Operator Catalog
  - catalog: registry.redhat.io/redhat/certified-operator-index:v4.21
    packages:
      # Storage - Portworx (from storage-operators.yml)
      - name: portworx-certified
        channels:
          - name: stable

# =========================================================================
# Mirroring Configuration
# =========================================================================
target_mirror_path: "/data/ocp-mirror"
clean_mirror_path: false

target_registry: "registry.ocp4.sandbox3377.opentlc.com:8443"
target_namespace: "openshift4"
skip_tls_verify: false

parallel_images: 4
parallel_layers: 5
max_retries: 5
