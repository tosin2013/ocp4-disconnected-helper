---
# Observability Stack Operators
#
# Description:
#   Complete operator bundle for cluster observability with logging (Loki),
#   distributed tracing (Tempo), and cluster metrics/monitoring.
#
# Use Case:
#   - Centralized logging for application and platform logs
#   - Long-term log retention and search (Loki)
#   - Distributed tracing for microservices debugging
#   - Cluster-wide observability and monitoring
#   - Node-level performance profiling
#
# Operators Included:
#   1. cluster-logging (Log collection and forwarding to Loki)
#   2. loki-operator (Log aggregation and storage backend)
#   3. tempo-product (Distributed tracing backend)
#   4. cluster-observability-operator (Unified observability platform)
#   5. openshift-gitops-operator (GitOps for observability config as code)
#
# Deployment Requirements:
#   - OpenShift 4.21+
#   - 16 GB RAM minimum per worker node
#   - Persistent storage for Loki (100 GB+ depending on log retention)
#   - Persistent storage for Tempo (50 GB+ depending on trace retention)
#   - S3-compatible object storage recommended for long-term retention
#
# Documentation:
#   https://docs.redhat.com/en/documentation/openshift_container_platform/4.21/html/observability/index
#
# Created: 2026-06-11
# ADR: 0034 (Operator Validation Framework)

operators:
  - catalog: registry.redhat.io/redhat/redhat-operator-index:v4.21
    packages:
      # Cluster Logging - collects and forwards application and platform logs
      - name: cluster-logging
        channels:
          - name: stable-6.5

      # Loki - log aggregation backend for efficient log storage and query
      - name: loki-operator
        channels:
          - name: stable-6.5

      # Tempo - distributed tracing backend for trace storage
      - name: tempo-product
        channels:
          - name: stable

      # Cluster Observability - unified observability platform (metrics + logs + traces)
      - name: cluster-observability-operator
        channels:
          - name: stable

      # GitOps - manage observability configuration as code
      - name: openshift-gitops-operator
        channels:
          - name: latest

# OpenShift Release (required for image mirroring)
openshift_releases:
  - name: stable-4.21
    minVersion: 4.21.0
    maxVersion: 4.21.0
    shortestPath: true

# Mirror Configuration
target_mirror_path: "/data/ocp-mirror"
target_namespace: "openshift4"
skip_tls_verify: false
